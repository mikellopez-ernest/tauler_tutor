<script>
  (function() {
    var state = {
      saving: false,
      students: [],
      contacts: [],
      authorizations: [],
      authorizationsLoaded: false,
      formLauncherUrl: ''
    };

    var appShell = document.querySelector('.app-shell');
    var errorPage = document.querySelector('.error-page');
    var saveButton = document.querySelector('.save-button');
    var saveLoading = document.querySelector('.save-loading');
    var initialLoading = document.querySelector('.initial-loading');

    bindNavigation();
    bindSorting();
    bindSaveButton();
    bindAuthorizationDetailModal();
    loadInitialData();

    function loadInitialData() {
      setInitialLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          setInitialLoading(false);
          var parsed = parseInitialData(result);

          if (!parsed || !parsed.ok) {
            showError(parsed && parsed.error ? parsed.error : {
              title: "S'ha produït un error",
              message: "S'ha produït un error",
              details: 'Resposta buida del servidor.'
            });
            return;
          }

          renderApp(parsed);
        })
        .withFailureHandler(function(error) {
          setInitialLoading(false);
          showError({
            title: "S'ha produït un error",
            message: "S'ha produït un error",
            details: error && error.message ? error.message : String(error)
          });
        })
        .loadInitialDataJson();
    }

    function parseInitialData(result) {
      if (!result) return null;

      if (typeof result === 'string') {
        try {
          return JSON.parse(result);
        } catch (error) {
          return {
            ok: false,
            error: {
              title: "S'ha produït un error",
              message: "S'ha produït un error",
              details: 'Resposta del servidor no vàlida: ' + error.message
            }
          };
        }
      }

      return result;
    }

    function renderApp(data) {
      state.students = data.students || [];
      state.contacts = data.contacts || [];
      state.formLauncherUrl = data.formLauncherUrl || '';

      document.getElementById('group-title').textContent = data.tutorGroup.dinantiaGroupId || '';
      document.getElementById('teacher-label').textContent = (data.tutorGroup.teacherLabel || '') + ' · ' + (data.tutorGroup.responsibility.name || '');

      renderStudents(state.students);
      renderContacts(state.contacts);
      renderAuthorizations();

      appShell.classList.remove('is-hidden');
      errorPage.classList.add('is-hidden');
      updateSaveButton();
    }

    function showError(error) {
      appShell.classList.add('is-hidden');
      errorPage.classList.remove('is-hidden');
      document.getElementById('error-title').textContent = error.title || "S'ha produït un error";
      document.getElementById('error-message').textContent = error.message || "S'ha produït un error";
      var details = document.getElementById('error-details');
      details.textContent = error.details || '';
      details.hidden = !error.details;
    }

    function renderStudents(students) {
      var tbody = document.getElementById('students-table');
      var empty = document.getElementById('students-empty');
      tbody.textContent = '';
      document.getElementById('students-count').textContent = students.length + ' alumnes';
      empty.classList.toggle('is-hidden', students.length > 0);

      students.forEach(function(student) {
        var row = document.createElement('tr');
        row.setAttribute('data-name', student.name || '');
        row.setAttribute('data-birthdate', student.birthdateSortKey || '');
        row.setAttribute('data-age', student.age || '');

        appendCell(row, student.name || '');
        appendCell(row, student.birthdate || '');
        appendCell(row, student.age || '');
        tbody.appendChild(row);
      });
    }

    function renderContacts(students) {
      var tbody = document.getElementById('contacts-table');
      var empty = document.getElementById('contacts-empty');
      tbody.textContent = '';
      document.getElementById('contacts-count').textContent = students.length + ' alumnes';
      empty.classList.toggle('is-hidden', students.length > 0);

      students.forEach(function(student, studentIndex) {
        var contacts = student.contacts && student.contacts.length ? student.contacts : [{ id: '', name: '', email: '', phone: '', position: 1 }];
        var bandClass = studentIndex % 2 === 0 ? 'student-band-even' : 'student-band-odd';

        contacts.forEach(function(contact, contactIndex) {
          var row = document.createElement('tr');
          row.className = bandClass;
          row.setAttribute('data-contact-row', '');
          row.setAttribute('data-student-id', student.id || '');

          if (contactIndex === 0) {
            var studentCell = appendCell(row, student.name || '');
            studentCell.rowSpan = contacts.length;
          }

          appendContactCell(row, contact, 'Name', 'text');
          appendContactCell(row, contact, 'Email', 'email');
          appendContactCell(row, contact, 'Phone', 'tel');
          tbody.appendChild(row);
        });
      });

      bindContactInputs();
    }



    function loadAuthorizations() {
      setInitialLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          setInitialLoading(false);
          var parsed = parseInitialData(result);
          state.authorizationsLoaded = true;
          if (!parsed || !parsed.ok) {
            showAuthorizationsError(parsed && parsed.error ? parsed.error.message || parsed.error.details : 'No s han pogut carregar les autoritzacions.');
            renderAuthorizations();
            return;
          }
          state.authorizations = parsed.authorizations || [];
          renderAuthorizations();
        })
        .withFailureHandler(function(error) {
          setInitialLoading(false);
          state.authorizationsLoaded = true;
          showAuthorizationsError(error && error.message ? error.message : String(error));
          renderAuthorizations();
        })
        .loadAuthorizationDataJson();
    }

    function renderAuthorizations() {
      var tbody = document.getElementById('authorizations-table');
      if (!tbody) return;
      tbody.textContent = '';
      document.getElementById('authorizations-count').textContent = state.students.length + ' alumnes';
      var latestByStudent = latestAuthorizationsByStudent_();
      state.students.forEach(function(student) {
        var auth = latestByStudent[String(student.id || '').trim()] || null;
        var row = document.createElement('tr');
        row.setAttribute('data-name', student.name || '');
        row.setAttribute('data-status', auth ? '1' : '0');
        row.setAttribute('data-date', auth ? String(auth.data_hora_enviament || auth.data_signatura || '') : '');
        if (!auth) row.classList.add('missing-authorization');
        appendStudentAuthorizationCell(row, student, auth);
        appendCell(row, auth ? 'Rebut' : 'Pendent');
        appendCell(row, auth ? formatAuthorizationDate(auth.data_hora_enviament || auth.data_signatura) : '');
        appendAuthorizationDetailCell(row, student, auth);
        ['sortida_sola','sortida_esbarjo','sortides_municipi','comunicacio_academica','comunicacio_salut','declaracio_plataformes','imatge_intranet','imatge_web','imatge_externa','obra_oberta','obra_centre','obra_biblioteca','obra_repositori','administracio_medicacio','paracetamol'].forEach(function(field) {
          appendIconCell(row, auth ? auth[field] : '');
        });
        appendIconCell(row, auth && (textValue(auth.problemes_salut) || textValue(auth.altres_salut)) ? true : '');
        appendIconCell(row, auth ? auth.signatura_responsable : '');
        appendIconCell(row, auth ? auth.signatura_alumne : '');
        tbody.appendChild(row);
      });
    }

    function latestAuthorizationsByStudent_() {
      var map = {};
      (state.authorizations || []).forEach(function(auth) {
        var id = String(auth.id_student || '').trim();
        if (!id) return;
        if (!map[id] || String(auth.data_hora_enviament || '') >= String(map[id].data_hora_enviament || '')) {
          map[id] = auth;
        }
      });
      return map;
    }


    function appendAuthorizationDetailCell(row, student, auth) {
      var cell = document.createElement('td');
      if (!auth) {
        cell.innerHTML = '<span class="icon-empty">-</span>';
        row.appendChild(cell);
        return;
      }
      var button = document.createElement('button');
      button.className = 'detail-button';
      button.type = 'button';
      button.textContent = 'Veure';
      button.setAttribute('aria-label', 'Mostra detalls de ' + (student.name || 'alumne'));
      button.addEventListener('click', function() {
        showAuthorizationDetail(student, auth);
      });
      cell.appendChild(button);
      row.appendChild(cell);
    }

    function showAuthorizationDetail(student, auth) {
      var modal = document.getElementById('authorization-detail-modal');
      var body = document.getElementById('authorization-detail-body');
      if (!modal || !body) return;
      document.getElementById('authorization-detail-title').textContent = 'Detall de ' + (student.name || 'l alumne');
      body.textContent = '';
      var groups = [
        { title: 'Enviament', fields: [['resposta_id','Resposta'], ['data_hora_enviament','Enviament'], ['idioma_formulari','Idioma'], ['codi_document','Codi document'], ['tipus_alumne','Tipus alumne']] },
        { title: 'Contacte academic', fields: [['acad_contacte_nom','Nom'], ['acad_contacte_email','Email'], ['acad_contacte_relacio','Relacio']] },
        { title: 'Emergencia', fields: [['emergencia_nom','Nom'], ['emergencia_telefon','Telefon'], ['emergencia_relacio','Relacio']] },
        { title: 'Salut', fields: [['problemes_salut','Problemes de salut'], ['altres_salut','Altres salut'], ['medicacio','Medicacio'], ['posologia','Posologia'], ['dosi','Dosi']] },
        { title: 'Publicacio', fields: [['plataformes_externes','Plataformes o acces']] },
        { title: 'Intern', fields: [['estat_validacio','Estat validacio'], ['observacions_internes','Observacions internes']] }
      ];
      groups.forEach(function(group) {
        var values = group.fields.map(function(pair) {
          return { label: pair[1], value: textValue(auth[pair[0]]) };
        }).filter(function(item) { return item.value; });
        if (!values.length) return;
        var section = document.createElement('section');
        section.className = 'detail-section';
        var heading = document.createElement('h3');
        heading.textContent = group.title;
        section.appendChild(heading);
        var dl = document.createElement('dl');
        values.forEach(function(item) {
          var dt = document.createElement('dt');
          dt.textContent = item.label;
          var dd = document.createElement('dd');
          dd.textContent = item.value;
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        section.appendChild(dl);
        body.appendChild(section);
      });
      if (!body.children.length) {
        var empty = document.createElement('p');
        empty.className = 'subtle';
        empty.textContent = 'No hi ha camps de detall informats.';
        body.appendChild(empty);
      }
      modal.classList.remove('is-hidden');
    }

    function closeAuthorizationDetail() {
      var modal = document.getElementById('authorization-detail-modal');
      if (modal) modal.classList.add('is-hidden');
    }

    function appendStudentAuthorizationCell(row, student, auth) {
      var cell = document.createElement('td');
      if (!auth) {
        var button = document.createElement('button');
        button.className = 'rocket-button';
        button.type = 'button';
        button.title = 'Llança el formulari';
        button.setAttribute('aria-label', 'Llança el formulari per a ' + (student.name || 'alumne'));
        button.textContent = '🚀';
        button.addEventListener('click', function() { launchAuthorizationForm(student, button); });
        cell.appendChild(button);
      }
      var name = document.createElement('span');
      name.textContent = student.name || '';
      cell.appendChild(name);
      row.appendChild(cell);
    }

    function appendIconCell(row, value) {
      var cell = document.createElement('td');
      var parsed = parseBooleanValue(value);
      if (parsed === true) {
        cell.innerHTML = '<span class="icon-ok" aria-label="Sí">✓</span>';
      } else if (parsed === false) {
        cell.innerHTML = '<span class="icon-no" aria-label="No">✕</span>';
      } else {
        cell.innerHTML = '<span class="icon-empty">-</span>';
      }
      row.appendChild(cell);
    }

    function parseBooleanValue(value) {
      if (value === true) return true;
      if (value === false) return false;
      var text = String(value === null || value === undefined ? '' : value).trim().toLowerCase();
      if (!text) return null;
      if (['true','si','sí','1','acceptada'].indexOf(text) !== -1) return true;
      if (['false','no','0'].indexOf(text) !== -1) return false;
      return null;
    }

    function launchAuthorizationForm(student, button) {
      var firstContact = firstContactForStudent(student.id);
      if (!state.formLauncherUrl) {
        alert('No hi ha cap URL de llançament configurada.');
        return;
      }
      button.disabled = true;
      var form = document.createElement('form');
      form.method = 'post';
      form.action = state.formLauncherUrl;
      form.target = '_blank';
      var payload = {
        student_id: student.id || '',
        alumne_nom: student.name || '',
        alumne_document: student.document || '',
        studyType: student.studyType || '',
        isAdult: student.isAdult || '',
        is14Plus: student.is14Plus || '',
        contact_name: firstContact.name || '',
        contact_phone: firstContact.phone || '',
        contact_email: firstContact.email || ''
      };
      Object.keys(payload).forEach(function(key) {
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = payload[key];
        form.appendChild(input);
      });
      document.body.appendChild(form);
      form.submit();
      form.remove();
      window.setTimeout(function() { button.disabled = false; }, 1200);
    }

    function firstContactForStudent(studentId) {
      var record = (state.contacts || []).filter(function(item) { return String(item.id) === String(studentId); })[0];
      return record && record.contacts && record.contacts[0] ? record.contacts[0] : { name: '', phone: '', email: '' };
    }

    function showAuthorizationsError(message) {
      var box = document.getElementById('authorizations-error');
      if (!box) return;
      box.textContent = message || 'No s han pogut carregar les autoritzacions.';
      box.classList.remove('is-hidden');
    }

    function formatAuthorizationDate(value) {
      return String(value || '').slice(0, 10);
    }

    function textValue(value) {
      return String(value === null || value === undefined ? '' : value).trim();
    }

    function appendContactCell(row, contact, suffix, type) {
      var cell = document.createElement('td');
      if (!contact.id) {
        var missing = document.createElement('span');
        missing.className = 'missing';
        missing.textContent = '-';
        cell.appendChild(missing);
        row.appendChild(cell);
        return;
      }

      var input = document.createElement('input');
      var value = contact[suffix.toLowerCase()] || '';
      input.className = 'contact-input';
      input.type = type;
      input.value = value;
      input.setAttribute('data-contact-id', contact.id);
      input.setAttribute('data-field', 'Contact' + (contact.position || 1) + suffix);
      input.setAttribute('data-original', value);
      cell.appendChild(input);
      row.appendChild(cell);
    }

    function appendCell(row, text) {
      var cell = document.createElement('td');
      cell.textContent = text;
      row.appendChild(cell);
      return cell;
    }


    function bindAuthorizationDetailModal() {
      var modal = document.getElementById('authorization-detail-modal');
      if (!modal) return;
      var close = modal.querySelector('.modal-close');
      if (close) close.addEventListener('click', closeAuthorizationDetail);
      modal.addEventListener('click', function(event) {
        if (event.target === modal) closeAuthorizationDetail();
      });
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') closeAuthorizationDetail();
      });
    }

    function bindNavigation() {
      document.querySelectorAll('[data-view]').forEach(function(link) {
        link.addEventListener('click', function(event) {
          event.preventDefault();
          var viewName = link.getAttribute('data-view');
          if (viewName === 'autoritzacions' && !state.authorizationsLoaded) {
            loadAuthorizations();
          }

          document.querySelectorAll('[data-view]').forEach(function(item) {
            item.classList.toggle('active', item === link);
          });

          document.querySelectorAll('.view').forEach(function(view) {
            view.classList.toggle('active', view.id === 'view-' + viewName);
          });

          updateSaveButton();
        });
      });
    }

    function bindSorting() {
      document.querySelectorAll('[data-sort-table]').forEach(function(button) {
        button.addEventListener('click', function() {
          var tableId = button.getAttribute('data-sort-table');
          var key = button.getAttribute('data-sort-key');
          var direction = button.classList.contains('sorted-asc') ? 'desc' : 'asc';

          document.querySelectorAll('[data-sort-table="' + tableId + '"]').forEach(function(item) {
            item.classList.remove('sorted-asc', 'sorted-desc');
          });
          button.classList.add(direction === 'asc' ? 'sorted-asc' : 'sorted-desc');

          sortRows(tableId, key, direction);
        });
      });
    }

    function sortRows(tableId, key, direction) {
      var tbody = document.getElementById(tableId);
      if (!tbody) return;

      var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
      var multiplier = direction === 'asc' ? 1 : -1;

      rows.sort(function(a, b) {
        var aValue = a.getAttribute('data-' + key) || '';
        var bValue = b.getAttribute('data-' + key) || '';

        if (key === 'age') {
          return compareNumber(aValue, bValue) * multiplier;
        }

        return aValue.localeCompare(bValue, 'ca', { sensitivity: 'base' }) * multiplier;
      });

      rows.forEach(function(row) {
        tbody.appendChild(row);
      });
    }

    function compareNumber(aValue, bValue) {
      var aNumber = aValue === '' ? Number.POSITIVE_INFINITY : Number(aValue);
      var bNumber = bValue === '' ? Number.POSITIVE_INFINITY : Number(bValue);
      return aNumber - bNumber;
    }

    function bindContactInputs() {
      document.querySelectorAll('.contact-input').forEach(function(input) {
        input.addEventListener('input', function() {
          input.classList.remove('invalid');
          var row = input.closest('[data-contact-row]');
          row.classList.toggle('dirty-row', rowHasChanges(row));
          updateSaveButton();
        });
      });
    }

    function bindSaveButton() {
      if (saveButton) {
        saveButton.addEventListener('click', saveContactChanges);
      }
    }

    function rowHasChanges(row) {
      return Array.prototype.some.call(row.querySelectorAll('.contact-input'), function(input) {
        return input.value !== input.getAttribute('data-original');
      });
    }

    function getDirtyRows() {
      return Array.prototype.slice.call(document.querySelectorAll('[data-contact-row].dirty-row'));
    }

    function updateSaveButton() {
      if (!saveButton) return;
      var contactesActive = document.getElementById('view-contactes') && document.getElementById('view-contactes').classList.contains('active');
      saveButton.classList.toggle('is-hidden', !contactesActive);
      saveButton.disabled = !contactesActive || state.saving || getDirtyRows().length === 0;
    }

    function collectChanges() {
      var changes = [];

      getDirtyRows().forEach(function(row) {
        var studentId = row.getAttribute('data-student-id');

        row.querySelectorAll('.contact-input').forEach(function(input) {
          var oldValue = input.getAttribute('data-original');
          var newValue = input.value.trim();

          if (oldValue !== newValue) {
            changes.push({
              studentId: studentId,
              contactId: input.getAttribute('data-contact-id'),
              fieldChanged: input.getAttribute('data-field'),
              oldValue: oldValue,
              newValue: newValue,
              input: input
            });
          }
        });
      });

      return changes;
    }

    function validateChanges(changes) {
      var errors = [];

      changes.forEach(function(change) {
        change.input.classList.remove('invalid');

        if (/Email$/.test(change.fieldChanged) && !isValidEmail(change.newValue)) {
          errors.push('Email no vàlid: ' + change.newValue);
          change.input.classList.add('invalid');
        }

        if (/Phone$/.test(change.fieldChanged) && !isValidPhone(change.newValue)) {
          errors.push('Telèfon no vàlid: ' + change.newValue);
          change.input.classList.add('invalid');
        }
      });

      return errors;
    }

    function isValidEmail(value) {
      var text = String(value || '').trim();
      return !text || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text);
    }

    function isValidPhone(value) {
      var text = String(value || '').trim();
      if (!text) return true;

      var compact = text.replace(/[\s().-]/g, '');
      if (/^\+\d{8,15}$/.test(compact)) return true;
      if (/^00\d{8,15}$/.test(compact)) return true;
      return /^[6789]\d{8}$/.test(compact);
    }

    function saveContactChanges() {
      if (state.saving) return;

      var collected = collectChanges();
      var errors = validateChanges(collected);

      if (errors.length) {
        alert(errors.join('\n'));
        return;
      }

      var changes = collected.map(function(change) {
        return {
          studentId: change.studentId,
          contactId: change.contactId,
          fieldChanged: change.fieldChanged,
          oldValue: change.oldValue,
          newValue: change.newValue
        };
      });

      if (!changes.length) {
        updateSaveButton();
        return;
      }

      state.saving = true;
      setSaveLoading(true);
      updateSaveButton();

      google.script.run
        .withSuccessHandler(function(result) {
          (result && result.changes ? result.changes : []).forEach(function(change) {
            var selector = '.contact-input[data-contact-id="' + cssEscape(change.contactId) + '"][data-field="' + cssEscape(change.fieldChanged) + '"]';
            document.querySelectorAll(selector).forEach(function(input) {
              input.value = change.newValue;
              input.setAttribute('data-original', change.newValue);
              input.classList.remove('invalid');
              var row = input.closest('[data-contact-row]');
              if (row) {
                row.classList.toggle('dirty-row', rowHasChanges(row));
              }
            });
          });

          getDirtyRows().forEach(function(row) {
            if (!rowHasChanges(row)) {
              row.classList.remove('dirty-row');
            }
          });

          state.saving = false;
          setSaveLoading(false);
          updateSaveButton();
        })
        .withFailureHandler(function(error) {
          alert("No s'han pogut desar els canvis: " + (error && error.message ? error.message : error));
          state.saving = false;
          setSaveLoading(false);
          updateSaveButton();
        })
        .saveContactChanges(changes);
    }

    function setInitialLoading(isLoading) {
      if (!initialLoading) return;
      initialLoading.classList.toggle('is-hidden', !isLoading);
    }

    function setSaveLoading(isLoading) {
      if (!saveLoading) return;
      saveLoading.hidden = !isLoading;
    }

    function cssEscape(value) {
      return String(value || '').replace(/["\\]/g, '\\$&');
    }
  })();
</script>
