<script>
  (function() {
    var state = {
      saving: false,
      students: [],
      contacts: [],
      authorizations: [],
      invitations: [],
      groups: [],
      selectedGroup: '__all',
      hasMultipleGroups: false,
      contactsLoadedScopes: {},
      contactsLoading: false,
      authorizationsLoaded: false,
      inviting: false,
      formLauncherUrl: '',
      contactSort: { key: 'name', direction: 'asc' }
    };

    var appShell = document.querySelector('.app-shell');
    var errorPage = document.querySelector('.error-page');
    var saveButton = document.querySelector('.save-button');
    var bulkInviteButton = document.querySelector('.bulk-invite-button');
    var refreshAuthButton = document.querySelector('.refresh-auth-button');
    var saveLoading = document.querySelector('.save-loading');
    var initialLoading = document.querySelector('.initial-loading');
    var authorizationFloatingScroll = document.getElementById('authorization-floating-scroll');
    var authorizationTableWrap = document.getElementById('authorizations-table-wrap');
    var groupFilter = document.getElementById('group-filter');
    var groupSelect = document.getElementById('group-select');

    bindNavigation();
    bindSorting();
    bindGroupFilter();
    bindSaveButton();
    bindBulkInviteButton();
    bindRefreshAuthButton();
    bindAuthorizationDetailModal();
    bindAuthorizationFloatingScroll();
    loadInitialData();

    function loadInitialData() {
      setInitialLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          setInitialLoading(false);
          var parsed = parseInitialData(result);

          if (!parsed || !parsed.ok) {
            showError(parsed && parsed.error ? parsed.error : {
              title: "S'ha produït un error",
              message: "S'ha produït un error",
              details: 'Resposta buida del servidor.'
            });
            return;
          }

          renderApp(parsed);
        })
        .withFailureHandler(function(error) {
          setInitialLoading(false);
          showError({
            title: "S'ha produït un error",
            message: "S'ha produït un error",
            details: error && error.message ? error.message : String(error)
          });
        })
        .loadInitialDataJson(window.TAULER_DEBUG === true);
    }

    function parseInitialData(result) {
      if (!result) return null;

      if (typeof result === 'string') {
        try {
          return JSON.parse(result);
        } catch (error) {
          return {
            ok: false,
            error: {
              title: "S'ha produït un error",
              message: "S'ha produït un error",
              details: 'Resposta del servidor no vàlida: ' + error.message
            }
          };
        }
      }

      return result;
    }

    function renderApp(data) {
      state.students = data.students || [];
      state.contacts = data.contacts || [];
      state.groups = data.groups || (data.tutorGroup && data.tutorGroup.groups) || [];
      state.hasMultipleGroups = state.groups.length > 1;
      state.selectedGroup = state.hasMultipleGroups ? '__all' : (state.groups[0] ? state.groups[0].dinantiaGroupId : '__all');
      state.formLauncherUrl = data.formLauncherUrl || '';

      document.getElementById('group-title').textContent = data.tutorGroup.dinantiaGroupId || '';
      document.getElementById('teacher-label').textContent = (data.tutorGroup.teacherLabel || '') + ' · ' + (data.tutorGroup.responsibility.name || '');

      renderGroupFilter();
      renderStudents(filteredStudents());
      renderContacts([]);
      renderAuthorizations();

      appShell.classList.remove('is-hidden');
      errorPage.classList.add('is-hidden');
      updateSaveButton();
    }

    function showError(error) {
      appShell.classList.add('is-hidden');
      errorPage.classList.remove('is-hidden');
      document.getElementById('error-title').textContent = error.title || "S'ha produït un error";
      document.getElementById('error-message').textContent = error.message || "S'ha produït un error";
      var details = document.getElementById('error-details');
      details.textContent = error.details || '';
      details.hidden = !error.details;
      renderDebugPanel(error.debug);
    }

    function renderDebugPanel(debug) {
      var panel = document.getElementById('debug-panel');
      var content = document.getElementById('debug-content');
      if (!panel || !content) return;
      content.textContent = '';
      panel.classList.toggle('is-hidden', !debug || !debug.steps);
      if (!debug || !debug.steps) return;

      var meta = document.createElement('p');
      meta.className = 'debug-meta';
      meta.textContent = 'Generat: ' + (debug.generatedAt || '');
      content.appendChild(meta);

      debug.steps.forEach(function(step) {
        var section = document.createElement('section');
        section.className = 'debug-step debug-' + String(step.status || '').toLowerCase();
        var title = document.createElement('h3');
        title.textContent = (step.status || '') + ' · ' + (step.step || '');
        var pre = document.createElement('pre');
        pre.textContent = JSON.stringify(step.details || {}, null, 2);
        section.appendChild(title);
        section.appendChild(pre);
        content.appendChild(section);
      });
    }

    function renderGroupFilter() {
      document.querySelectorAll('.group-column').forEach(function(column) {
        column.classList.toggle('is-hidden', !state.hasMultipleGroups);
      });
      if (!groupFilter || !groupSelect) return;
      groupFilter.classList.toggle('is-hidden', !state.hasMultipleGroups);
      groupSelect.textContent = '';
      if (!state.hasMultipleGroups) return;

      var all = document.createElement('option');
      all.value = '__all';
      all.textContent = 'Tots els grups';
      groupSelect.appendChild(all);

      state.groups.forEach(function(group) {
        var option = document.createElement('option');
        option.value = group.dinantiaGroupId || '';
        option.textContent = group.dinantiaGroupId || '';
        groupSelect.appendChild(option);
      });
      groupSelect.value = state.selectedGroup;
    }

    function bindGroupFilter() {
      if (!groupSelect) return;
      groupSelect.addEventListener('change', function() {
        state.selectedGroup = groupSelect.value || '__all';
        rerenderCurrentData();
      });
    }

    function filteredStudents() {
      var students = (!state.hasMultipleGroups || state.selectedGroup === '__all') ? state.students.slice() : state.students.filter(function(student) {
        return String(student.groupName || '') === state.selectedGroup;
      });
      return sortStudentListByName_(students);
    }

    function filteredContacts() {
      var contacts = (!state.hasMultipleGroups || state.selectedGroup === '__all') ? state.contacts.slice() : state.contacts.filter(function(student) {
        return String(student.groupName || '') === state.selectedGroup;
      });
      return sortContactStudentList_(contacts);
    }

    function sortStudentListByName_(students) {
      return (students || []).slice().sort(function(a, b) {
        return String(a.name || '').localeCompare(String(b.name || ''), 'ca', { sensitivity: 'base' });
      });
    }

    function sortContactStudentList_(students) {
      var sort = state.contactSort || { key: 'name', direction: 'asc' };
      var multiplier = sort.direction === 'desc' ? -1 : 1;
      return (students || []).slice().sort(function(a, b) {
        return contactSortValue_(a, sort.key).localeCompare(contactSortValue_(b, sort.key), 'ca', { sensitivity: 'base' }) * multiplier;
      });
    }

    function contactSortValue_(student, key) {
      var contacts = student && student.contacts && student.contacts.length ? student.contacts : [];
      var first = contacts[0] || {};
      if (key === 'group') return String(student && student.groupName || '');
      if (key === 'contact-name') return String(first.name || '');
      if (key === 'contact-email') return String(first.email || '');
      if (key === 'contact-phone') return String(first.phone || '');
      return String(student && student.name || '');
    }

    function rerenderCurrentData() {
      var students = filteredStudents();
      renderStudents(students);
      if (isViewActive('contactes')) {
        loadVisibleContactsIfNeeded();
      } else {
        renderContacts(filteredContacts());
      }
      renderAuthorizations();
      document.getElementById('group-title').textContent = state.selectedGroup === '__all' ? 'Tots els grups' : state.selectedGroup;
      updateSaveButton();
    }

    function renderStudents(students) {
      var tbody = document.getElementById('students-table');
      var empty = document.getElementById('students-empty');
      tbody.textContent = '';
      document.getElementById('students-count').textContent = students.length + ' alumnes';
      empty.classList.toggle('is-hidden', students.length > 0);

      students.forEach(function(student) {
        var row = document.createElement('tr');
        row.setAttribute('data-group', student.groupName || '');
        row.setAttribute('data-name', student.name || '');
        row.setAttribute('data-birthdate', student.birthdateSortKey || '');
        row.setAttribute('data-age', student.age || '');

        if (state.hasMultipleGroups) appendCell(row, student.groupName || '');
        appendCell(row, student.name || '');
        appendCell(row, student.birthdate || '');
        appendCell(row, student.age || '');
        tbody.appendChild(row);
      });
    }

    function renderContacts(students) {
      var tbody = document.getElementById('contacts-table');
      var empty = document.getElementById('contacts-empty');
      tbody.textContent = '';
      document.getElementById('contacts-count').textContent = students.length + ' alumnes';
      empty.classList.toggle('is-hidden', students.length > 0);

      students.forEach(function(student, studentIndex) {
        var contacts = student.contacts && student.contacts.length ? student.contacts : [{ id: '', name: '', email: '', phone: '', position: 1 }];
        var bandClass = studentIndex % 2 === 0 ? 'student-band-even' : 'student-band-odd';

        contacts.forEach(function(contact, contactIndex) {
          var row = document.createElement('tr');
          row.className = bandClass;
          row.setAttribute('data-contact-row', '');
          row.setAttribute('data-student-id', student.id || '');

          if (contactIndex === 0) {
            if (state.hasMultipleGroups) {
              var groupCell = appendCell(row, student.groupName || '');
              groupCell.rowSpan = contacts.length;
            }
            var studentCell = appendCell(row, student.name || '');
            studentCell.rowSpan = contacts.length;
          }

          appendContactCell(row, contact, 'Name', 'text');
          appendContactCell(row, contact, 'Email', 'email');
          appendContactCell(row, contact, 'Phone', 'tel');
          tbody.appendChild(row);
        });
      });

      bindContactInputs();
    }

    function loadVisibleContactsIfNeeded(callback) {
      var scope = contactScopeKey();
      if (state.contactsLoadedScopes[scope]) {
        renderContacts(filteredContacts());
        if (callback) callback();
        return;
      }
      if (state.contactsLoading) return;

      var students = filteredStudents();
      state.contactsLoading = true;
      setInitialLoading(true);

      google.script.run
        .withSuccessHandler(function(result) {
          state.contactsLoading = false;
          setInitialLoading(false);
          var parsed = parseInitialData(result);
          if (!parsed || !parsed.ok) {
            alert("No s'han pogut carregar els contactes: " + (parsed && parsed.error ? parsed.error.details || parsed.error.message : 'Resposta buida del servidor.'));
            renderContacts(filteredContacts());
            return;
          }
          mergeContacts(parsed.contacts || []);
          state.contactsLoadedScopes[scope] = true;
          renderContacts(filteredContacts());
          if (callback) callback();
        })
        .withFailureHandler(function(error) {
          state.contactsLoading = false;
          setInitialLoading(false);
          alert("No s'han pogut carregar els contactes: " + (error && error.message ? error.message : error));
          renderContacts(filteredContacts());
        })
        .loadContactsForStudents(students);
    }

    function contactScopeKey() {
      return state.selectedGroup || '__all';
    }

    function mergeContacts(contacts) {
      var byId = {};
      (state.contacts || []).forEach(function(item) {
        byId[String(item.id || '')] = item;
      });
      (contacts || []).forEach(function(item) {
        if (!item || !item.id) return;
        byId[String(item.id)] = item;
      });
      state.contacts = Object.keys(byId).map(function(id) { return byId[id]; });
    }



    function loadAuthorizations() {
      setInitialLoading(true);
      google.script.run
        .withSuccessHandler(function(result) {
          setInitialLoading(false);
          var parsed = parseInitialData(result);
          state.authorizationsLoaded = true;
          if (!parsed || !parsed.ok) {
            showAuthorizationsError(parsed && parsed.error ? parsed.error.message || parsed.error.details : 'No s han pogut carregar les autoritzacions.');
            renderAuthorizations();
            return;
          }
          state.authorizations = parsed.authorizations || [];
          state.invitations = parsed.invitations || [];
          renderAuthorizations();
        })
        .withFailureHandler(function(error) {
          setInitialLoading(false);
          state.authorizationsLoaded = true;
          showAuthorizationsError(error && error.message ? error.message : String(error));
          renderAuthorizations();
        })
        .loadAuthorizationDataJson();
    }

    function refreshAuthorizations() {
      if (state.inviting) return;
      state.inviting = true;
      setInitialLoading(true);
      updateInvitationControls();
      google.script.run
        .withSuccessHandler(function(result) {
          state.inviting = false;
          setInitialLoading(false);
          var parsed = parseInitialData(result);
          state.authorizationsLoaded = true;
          if (!parsed || !parsed.ok) {
            showAuthorizationsError(parsed && parsed.error ? parsed.error.message || parsed.error.details : 'No s han pogut actualitzar les autoritzacions.');
            updateInvitationControls();
            return;
          }
          state.authorizations = parsed.authorizations || [];
          state.invitations = parsed.invitations || [];
          renderAuthorizations();
        })
        .withFailureHandler(function(error) {
          state.inviting = false;
          setInitialLoading(false);
          showAuthorizationsError(error && error.message ? error.message : String(error));
          updateInvitationControls();
        })
        .refreshAuthorizationDataJson();
    }

    function renderAuthorizations() {
      var tbody = document.getElementById('authorizations-table');
      if (!tbody) return;
      tbody.textContent = '';
      var visibleStudents = filteredStudents();
      document.getElementById('authorizations-count').textContent = visibleStudents.length + ' alumnes';
      var latestByStudent = latestAuthorizationsByStudent_();
      var latestInvitations = latestInvitationsByStudent_();
      visibleStudents.forEach(function(student) {
        var auth = latestByStudent[String(student.id || '').trim()] || null;
        var status = authorizationStatus(student, auth);
        var row = document.createElement('tr');
        row.setAttribute('data-name', student.name || '');
        row.setAttribute('data-group', student.groupName || '');
        row.setAttribute('data-status', status.sortKey);
        row.setAttribute('data-date', auth ? String(auth.data_hora_enviament || auth.data_signatura || '') : '');
        row.setAttribute('data-invitation-target', status.target || '');
        row.setAttribute('data-student-id', student.id || '');
        if (!auth) row.classList.add('missing-authorization');
        appendStudentAuthorizationCell(row, student, auth);
        if (state.hasMultipleGroups) appendCell(row, student.groupName || '');
        appendAuthorizationStatusCell(row, student, auth, status);
        appendCell(row, auth ? formatAuthorizationDate(auth.data_hora_enviament || auth.data_signatura) : '');
        appendAuthorizationDetailCell(row, student, auth, latestInvitations[String(student.id || '').trim()] || null);
        ['sortida_sola','sortida_esbarjo','sortides_municipi','comunicacio_academica','comunicacio_salut','declaracio_plataformes','imatge_intranet','imatge_web','imatge_externa','obra_oberta','obra_centre','obra_biblioteca','obra_repositori','administracio_medicacio','paracetamol'].forEach(function(field) {
          appendIconCell(row, auth ? auth[field] : '');
        });
        appendIconCell(row, auth && (textValue(auth.problemes_salut) || textValue(auth.altres_salut)) ? true : '');
        appendIconCell(row, auth ? auth.carta_compromis_acceptada : '');
        appendIconCell(row, auth ? auth.consentiment_mobil : '');
        appendIconCell(row, auth ? auth.signatura_responsable : '');
        appendIconCell(row, auth ? auth.signatura_alumne : '');
        tbody.appendChild(row);
      });
      updateInvitationControls();
      syncAuthorizationFloatingScroll();
    }

    function latestAuthorizationsByStudent_() {
      var map = {};
      (state.authorizations || []).forEach(function(auth) {
        var id = String(auth.id_student || '').trim();
        if (!id) return;
        if (parseBooleanValue(auth.invalidated) === true) return;
        if (!map[id] || String(auth.data_hora_enviament || '') >= String(map[id].data_hora_enviament || '')) {
          map[id] = auth;
        }
      });
      return map;
    }

    function latestInvitationsByStudent_() {
      var map = {};
      (state.invitations || []).forEach(function(invitation) {
        var id = String(invitation.student_id || '').trim();
        if (!id) return;
        if (!map[id] || String(invitation.created_at || '') >= String(map[id].created_at || '')) {
          map[id] = invitation;
        }
      });
      return map;
    }

    function appendAuthorizationStatusCell(row, student, auth, status) {
      var cell = document.createElement('td');
      var label = document.createElement('span');
      label.textContent = status.label;
      cell.appendChild(label);
      if (status.target) {
        var button = document.createElement('button');
        button.className = 'status-action';
        button.type = 'button';
        button.textContent = status.target === 'student' ? 'Enviar a alumne' : 'Enviar a tutors';
        button.addEventListener('click', function() {
          var request = buildInvitationRequest(student, auth, status.target);
          if (status.target === 'parents') {
            openContactSelectionModal(request);
          } else {
            sendInvitationRequests([request]);
          }
        });
        cell.appendChild(button);
      }
      row.appendChild(cell);
    }

    function authorizationStatus(student, auth) {
      var adult = isAdultStudent(student);
      if (!auth) return adult ? { label: 'Pendent alumne', target: 'student', sortKey: '2' } : { label: 'Pendent', target: 'parents', sortKey: '0' };
      if (adult) {
        if (String(auth.tipus_alumne || '').trim() === 'major18') return { label: 'Complet', target: '', sortKey: '3' };
        if (parseBooleanValue(auth.signatura_alumne) !== true) return { label: 'Pendent alumne', target: 'student', sortKey: '2' };
        return { label: 'Complet', target: '', sortKey: '3' };
      }
      if (parseBooleanValue(auth.signatura_responsable) !== true) return { label: 'Pendent tutors', target: 'parents', sortKey: '1' };
      if (String(auth.tipus_alumne || '').trim() === 'eso_menor14') return { label: 'Complet', target: '', sortKey: '3' };
      if (parseBooleanValue(auth.signatura_alumne) !== true) return { label: 'Pendent alumne', target: 'student', sortKey: '2' };
      return { label: 'Complet', target: '', sortKey: '3' };
    }

    function isAdultStudent(student) {
      var adultText = String(student && student.isAdult || '').trim().toLowerCase();
      if (adultText === 'si' || adultText === 'sí' || adultText === 'true') return true;
      return Number(student && student.age) >= 18;
    }

    function appendAuthorizationDetailCell(row, student, auth, latestInvitation) {
      var cell = document.createElement('td');
      if (!auth) {
        var missingButton = document.createElement('button');
        missingButton.className = 'detail-button';
        missingButton.type = 'button';
        missingButton.textContent = 'Veure';
        missingButton.setAttribute('aria-label', 'Mostra detalls de ' + (student.name || 'alumne'));
        missingButton.addEventListener('click', function() {
          showAuthorizationDetail(student, null, latestInvitation);
        });
        cell.appendChild(missingButton);
        row.appendChild(cell);
        return;
      }
      var button = document.createElement('button');
      button.className = 'detail-button';
      button.type = 'button';
      button.textContent = 'Veure';
      button.setAttribute('aria-label', 'Mostra detalls de ' + (student.name || 'alumne'));
      button.addEventListener('click', function() {
        showAuthorizationDetail(student, auth, latestInvitation);
      });
      cell.appendChild(button);
      row.appendChild(cell);
    }

    function showAuthorizationDetail(student, auth, latestInvitation) {
      var modal = document.getElementById('authorization-detail-modal');
      var body = document.getElementById('authorization-detail-body');
      if (!modal || !body) return;
      document.getElementById('authorization-detail-title').textContent = 'Detall de ' + (student.name || 'l alumne');
      body.textContent = '';
      var groups = [
        { title: 'Enviament', fields: [['resposta_id','Resposta'], ['data_hora_enviament','Enviament'], ['idioma_formulari','Idioma'], ['codi_document','Codi document'], ['tipus_alumne','Tipus alumne'], ['submitted_by_email','Emplenat per'], ['submitted_by_dinantia_account_id','Compte Dinantia'], ['updated_at','Última actualització'], ['updated_by_email','Actualitzat per']] },
        { title: 'Contacte academic', fields: [['acad_contacte_nom','Nom'], ['acad_contacte_email','Email'], ['acad_contacte_relacio','Relacio']] },
        { title: 'Emergencia', fields: [['emergencia_nom','Nom'], ['emergencia_telefon','Telefon'], ['emergencia_relacio','Relacio']] },
        { title: 'Salut', fields: [['problemes_salut','Problemes de salut'], ['altres_salut','Altres salut'], ['medicacio','Medicacio'], ['posologia','Posologia'], ['dosi','Dosi']] },
        { title: 'Documents i normativa', fields: [['carta_compromis_acceptada','Carta de compromís'], ['consentiment_mobil','Consentiment mòbil']] },
        { title: 'Publicacio', fields: [['plataformes_externes','Plataformes o acces']] },
        { title: 'Intern', fields: [['estat_validacio','Estat validacio'], ['observacions_internes','Observacions internes']] }
      ];
      if (auth) groups.forEach(function(group) {
        var values = group.fields.map(function(pair) {
          return { label: pair[1], value: textValue(auth[pair[0]]) };
        }).filter(function(item) { return item.value; });
        if (!values.length) return;
        var section = document.createElement('section');
        section.className = 'detail-section';
        var heading = document.createElement('h3');
        heading.textContent = group.title;
        section.appendChild(heading);
        var dl = document.createElement('dl');
        values.forEach(function(item) {
          var dt = document.createElement('dt');
          dt.textContent = item.label;
          var dd = document.createElement('dd');
          dd.textContent = item.value;
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        section.appendChild(dl);
        body.appendChild(section);
      });
      if (auth) appendAuthorizedPeopleDetail(body, auth);
      appendLatestInvitationDetail(body, latestInvitation);
      if (!body.children.length) {
        var empty = document.createElement('p');
        empty.className = 'subtle';
        empty.textContent = 'No hi ha camps de detall informats.';
        body.appendChild(empty);
      }
      modal.classList.remove('is-hidden');
    }

    function appendAuthorizedPeopleDetail(body, auth) {
      var people = parseAuthorizedPeople_(auth);
      if (!people.length) return;
      var values = people.map(function(person, index) {
        return {
          label: 'Persona ' + (index + 1),
          value: [person.nom_sencer || '', person.qualitat_de || ''].filter(Boolean).join(' · ')
        };
      }).filter(function(item) { return item.value; });
      appendDetailGroup(body, 'Persones autoritzades', values);
    }

    function parseAuthorizedPeople_(auth) {
      if (Array.isArray(auth.authorized_people)) return auth.authorized_people;
      var raw = textValue(auth.authorized_people_json);
      if (!raw) return [];
      try {
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function appendLatestInvitationDetail(body, latestInvitation) {
      var section = document.createElement('section');
      section.className = 'detail-section';
      var heading = document.createElement('h3');
      heading.textContent = 'Última invitació enviada';
      section.appendChild(heading);

      if (!latestInvitation) {
        var empty = document.createElement('p');
        empty.className = 'subtle';
        empty.textContent = 'No consta cap invitació enviada.';
        section.appendChild(empty);
        body.appendChild(section);
        return;
      }

      var dl = document.createElement('dl');
      [
        ['Data', latestInvitation.created_at],
        ['Correu', latestInvitation.email],
        ['Tipus', invitationSenderLabel(latestInvitation.sender)],
        ['Estat', invitationStatusLabel(latestInvitation.status)]
      ].forEach(function(item) {
        var dt = document.createElement('dt');
        var dd = document.createElement('dd');
        dt.textContent = item[0];
        dd.textContent = item[1] || '-';
        dl.appendChild(dt);
        dl.appendChild(dd);
      });
      section.appendChild(dl);
      body.appendChild(section);
    }

    function invitationSenderLabel(value) {
      var text = String(value || '').trim().toLowerCase();
      if (text === 'parent') return 'Família';
      if (text === 'student') return 'Alumne/a';
      return value || '-';
    }

    function invitationStatusLabel(value) {
      var text = String(value || '').trim().toLowerCase();
      if (text === 'pending') return 'Pendent';
      if (text === 'used') return 'Utilitzada';
      if (text === 'expired') return 'Caducada';
      if (text === 'revoked') return 'Revocada';
      return value || '-';
    }

    function closeAuthorizationDetail() {
      var modal = document.getElementById('authorization-detail-modal');
      if (modal) modal.classList.add('is-hidden');
    }

    function appendStudentAuthorizationCell(row, student, auth) {
      var cell = document.createElement('td');
      var wrapper = document.createElement('span');
      wrapper.className = 'student-name-with-action';
      if (auth) {
        var docButton = document.createElement('button');
        docButton.className = 'document-button';
        docButton.type = 'button';
        docButton.title = 'Mostra el formulari';
        docButton.setAttribute('aria-label', 'Mostra el formulari de ' + (student.name || 'alumne'));
        docButton.textContent = '📄';
        docButton.addEventListener('click', function() {
          openReadonlyAuthorizationDocument(student, auth, docButton);
        });
        wrapper.appendChild(docButton);
        var invalidateButton = document.createElement('button');
        invalidateButton.className = 'document-button invalidate-button';
        invalidateButton.type = 'button';
        invalidateButton.title = 'Invalida el formulari';
        invalidateButton.setAttribute('aria-label', 'Invalida el formulari de ' + (student.name || 'alumne'));
        invalidateButton.textContent = '✕';
        invalidateButton.addEventListener('click', function() {
          invalidateAuthorizationDocument(student, auth, invalidateButton);
        });
        wrapper.appendChild(invalidateButton);
      }
      var name = document.createElement('span');
      name.textContent = student.name || '';
      wrapper.appendChild(name);
      cell.appendChild(wrapper);
      row.appendChild(cell);
    }

    function invalidateAuthorizationDocument(student, auth, button) {
      if (!auth || !auth.resposta_id) {
        alert('No hi ha cap formulari per invalidar.');
        return;
      }
      var reason = window.prompt('Motiu de la invalidació');
      if (reason === null) return;
      button.disabled = true;
      setInitialLoading(true);
      google.script.run
        .withSuccessHandler(function() {
          button.disabled = false;
          setInitialLoading(false);
          loadAuthorizations();
        })
        .withFailureHandler(function(error) {
          button.disabled = false;
          setInitialLoading(false);
          alert('No s ha pogut invalidar el formulari: ' + (error && error.message ? error.message : error));
        })
        .invalidateAuthorizationResponse({
          resposta_id: auth.resposta_id,
          reason: reason || ''
        });
    }

    function openReadonlyAuthorizationDocument(student, auth, button) {
      if (!auth || !auth.resposta_id) {
        alert('No hi ha cap formulari per obrir.');
        return;
      }
      button.disabled = true;
      google.script.run
        .withSuccessHandler(function(result) {
          button.disabled = false;
          if (!result || !result.url) {
            alert('No s ha pogut crear l enllaç del formulari.');
            return;
          }
          window.open(result.url, '_blank', 'noopener');
        })
        .withFailureHandler(function(error) {
          button.disabled = false;
          alert('No s ha pogut obrir el formulari: ' + (error && error.message ? error.message : error));
        })
        .createAuthorizationPrintLink({
          student: {
            id: student.id || '',
            name: student.name || '',
            email: student.email || '',
            document: student.document || '',
            studyType: student.studyType || '',
            isAdult: student.isAdult || '',
            is14Plus: student.is14Plus || '',
            age: student.age || '',
            birthdateIso: student.birthdateSortKey || ''
          },
          authorization: {
            resposta_id: auth.resposta_id || ''
          }
        });
    }

    function appendDetailGroup(body, titleText, values) {
      if (!values.length) return;
      var section = document.createElement('section');
      section.className = 'detail-section';
      var heading = document.createElement('h3');
      heading.textContent = titleText;
      section.appendChild(heading);
      var dl = document.createElement('dl');
      values.forEach(function(item) {
        var dt = document.createElement('dt');
        dt.textContent = item.label;
        var dd = document.createElement('dd');
        dd.textContent = item.value;
        dl.appendChild(dt);
        dl.appendChild(dd);
      });
      section.appendChild(dl);
      body.appendChild(section);
    }

    function formatReadonlyValue(value) {
      var parsed = parseBooleanValue(value);
      if (parsed === true) return 'Si';
      if (parsed === false) return 'No';
      return textValue(value);
    }

    function appendIconCell(row, value) {
      var cell = document.createElement('td');
      var parsed = parseBooleanValue(value);
      if (parsed === true) {
        cell.innerHTML = '<span class="icon-ok" aria-label="Sí">✓</span>';
      } else if (parsed === false) {
        cell.innerHTML = '<span class="icon-no" aria-label="No">✕</span>';
      } else {
        cell.innerHTML = '<span class="icon-empty">-</span>';
      }
      row.appendChild(cell);
    }

    function parseBooleanValue(value) {
      if (value === true) return true;
      if (value === false) return false;
      var text = String(value === null || value === undefined ? '' : value).trim().toLowerCase();
      if (!text) return null;
      if (['true','si','sí','1','acceptada'].indexOf(text) !== -1) return true;
      if (['false','no','0'].indexOf(text) !== -1) return false;
      return null;
    }

    function launchAuthorizationForm(student, button) {
      var firstContact = firstContactForStudent(student.id);
      if (!state.formLauncherUrl) {
        alert('No hi ha cap URL de llançament configurada.');
        return;
      }
      button.disabled = true;
      var form = document.createElement('form');
      form.method = 'post';
      form.action = state.formLauncherUrl;
      form.target = '_blank';
      var payload = {
        student_id: student.id || '',
        alumne_nom: student.name || '',
        alumne_document: student.document || '',
        studyType: student.studyType || '',
        isAdult: student.isAdult || '',
        is14Plus: student.is14Plus || '',
        contact_name: firstContact.name || '',
        contact_phone: firstContact.phone || '',
        contact_email: firstContact.email || ''
      };
      Object.keys(payload).forEach(function(key) {
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = payload[key];
        form.appendChild(input);
      });
      document.body.appendChild(form);
      form.submit();
      form.remove();
      window.setTimeout(function() { button.disabled = false; }, 1200);
    }

    function firstContactForStudent(studentId) {
      var record = (state.contacts || []).filter(function(item) { return String(item.id) === String(studentId); })[0];
      return record && record.contacts && record.contacts[0] ? record.contacts[0] : { name: '', phone: '', email: '' };
    }

    function contactsForStudent(studentId) {
      var record = (state.contacts || []).filter(function(item) { return String(item.id) === String(studentId); })[0];
      return record && record.contacts ? record.contacts : [];
    }

    function openContactSelectionModal(request) {
      if (!request.contacts || !request.contacts.length) {
        loadVisibleContactsIfNeeded(function() {
          request.contacts = contactsForStudent(request.student && request.student.id);
          openContactSelectionModal(request);
        });
        return;
      }
      var modal = document.getElementById('authorization-detail-modal');
      var body = document.getElementById('authorization-detail-body');
      if (!modal || !body) return;
      document.getElementById('authorization-detail-title').textContent = 'Enviar a tutors';
      body.textContent = '';

      var intro = document.createElement('p');
      intro.className = 'subtle';
      intro.textContent = 'Selecciona els contactes que rebran l enllaç del formulari.';
      body.appendChild(intro);

      var list = document.createElement('div');
      list.className = 'contact-checklist';
      request.contacts.forEach(function(contact, index) {
        var id = 'invite-contact-' + index;
        var label = document.createElement('label');
        label.className = 'contact-check';
        var input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = true;
        input.value = index;
        input.id = id;
        var text = document.createElement('span');
        text.textContent = [contact.name || 'Contacte', contact.email || 'sense email'].join(' · ');
        label.appendChild(input);
        label.appendChild(text);
        list.appendChild(label);
      });
      body.appendChild(list);

      var actions = document.createElement('div');
      actions.className = 'modal-actions';
      var cancel = document.createElement('button');
      cancel.className = 'detail-button';
      cancel.type = 'button';
      cancel.textContent = 'Cancel·la';
      cancel.addEventListener('click', closeAuthorizationDetail);
      var send = document.createElement('button');
      send.className = 'status-action';
      send.type = 'button';
      send.textContent = 'Enviar';
      send.addEventListener('click', function() {
        var selected = Array.prototype.slice.call(list.querySelectorAll('input:checked')).map(function(input) {
          return request.contacts[Number(input.value)];
        }).filter(Boolean);
        if (!selected.length) {
          alert('Selecciona almenys un contacte.');
          return;
        }
        closeAuthorizationDetail();
        request.contacts = selected;
        sendInvitationRequests([request]);
      });
      actions.appendChild(cancel);
      actions.appendChild(send);
      body.appendChild(actions);
      modal.classList.remove('is-hidden');
    }

    function buildInvitationRequest(student, auth, target) {
      return {
        target: target,
        student: {
          id: student.id || '',
          name: student.name || '',
          email: student.email || '',
          document: student.document || '',
          studyType: student.studyType || '',
          isAdult: student.isAdult || '',
          is14Plus: student.is14Plus || '',
          age: student.age || '',
          birthdateIso: student.birthdateSortKey || ''
        },
        contacts: target === 'parents' ? contactsForStudent(student.id) : [],
        authorization: {
          resposta_id: auth ? auth.resposta_id || '' : ''
        }
      };
    }

    function pendingInvitationRequests() {
      var latestByStudent = latestAuthorizationsByStudent_();
      return filteredStudents().map(function(student) {
        var auth = latestByStudent[String(student.id || '').trim()] || null;
        var status = authorizationStatus(student, auth);
        return status.target ? buildInvitationRequest(student, auth, status.target) : null;
      }).filter(Boolean);
    }

    function sendInvitationRequests(requests) {
      if (state.inviting) return;
      if (!requests || !requests.length) {
        alert('No hi ha cap invitació pendent per enviar.');
        return;
      }

      if (needsParentContacts(requests) && !state.contactsLoadedScopes[contactScopeKey()]) {
        loadVisibleContactsIfNeeded(function() {
          sendInvitationRequests(hydrateParentInvitationContacts(requests));
        });
        return;
      }

      requests = hydrateParentInvitationContacts(requests);

      state.inviting = true;
      setInitialLoading(true);
      updateInvitationControls();

      google.script.run
        .withSuccessHandler(function(result) {
          state.inviting = false;
          setInitialLoading(false);
          updateInvitationControls();
          showInvitationSummary(result || {});
          loadAuthorizations();
        })
        .withFailureHandler(function(error) {
          state.inviting = false;
          setInitialLoading(false);
          updateInvitationControls();
          alert("No s'han pogut enviar les invitacions: " + (error && error.message ? error.message : error));
        })
        .sendAuthorizationInvitations(requests);
    }

    function needsParentContacts(requests) {
      return (requests || []).some(function(request) {
        return request.target === 'parents' && (!request.contacts || !request.contacts.length);
      });
    }

    function hydrateParentInvitationContacts(requests) {
      return (requests || []).map(function(request) {
        if (request.target !== 'parents') return request;
        request.contacts = contactsForStudent(request.student && request.student.id);
        return request;
      });
    }

    function showInvitationSummary(result) {
      var lines = [
        'Invitacions enviades: ' + Number(result.sent || 0),
        'Omeses: ' + Number(result.skipped || 0)
      ];
      if (result.errors && result.errors.length) {
        lines.push('Incidències:');
        result.errors.slice(0, 5).forEach(function(error) { lines.push('- ' + error); });
        if (result.errors.length > 5) lines.push('- ...');
      }
      alert(lines.join('\n'));
    }

    function bindBulkInviteButton() {
      if (!bulkInviteButton) return;
      bulkInviteButton.addEventListener('click', function() {
        var requests = pendingInvitationRequests();
        if (!requests.length) {
          alert('No hi ha cap invitació pendent per enviar.');
          return;
        }
        if (!confirm("S'enviaran invitacions a tots els formularis pendents visibles. Vols continuar?")) return;
        sendInvitationRequests(requests);
      });
    }

    function bindRefreshAuthButton() {
      if (!refreshAuthButton) return;
      refreshAuthButton.addEventListener('click', refreshAuthorizations);
    }

    function updateInvitationControls() {
      if (bulkInviteButton) {
        var active = document.getElementById('view-autoritzacions') && document.getElementById('view-autoritzacions').classList.contains('active');
        var pending = pendingInvitationRequests().length;
        bulkInviteButton.classList.toggle('is-hidden', !active);
        bulkInviteButton.disabled = !active || state.inviting || pending === 0 || !state.authorizationsLoaded;
      }
      if (refreshAuthButton) {
        var refreshActive = document.getElementById('view-autoritzacions') && document.getElementById('view-autoritzacions').classList.contains('active');
        refreshAuthButton.classList.toggle('is-hidden', !refreshActive);
        refreshAuthButton.disabled = !refreshActive || state.inviting;
      }
      document.querySelectorAll('.status-action').forEach(function(button) {
        button.disabled = state.inviting;
      });
      updateAuthorizationFloatingScroll();
    }

    function showAuthorizationsError(message) {
      var box = document.getElementById('authorizations-error');
      if (!box) return;
      box.textContent = message || 'No s han pogut carregar les autoritzacions.';
      box.classList.remove('is-hidden');
    }

    function formatAuthorizationDate(value) {
      return String(value || '').slice(0, 10);
    }

    function textValue(value) {
      return String(value === null || value === undefined ? '' : value).trim();
    }

    function appendContactCell(row, contact, suffix, type) {
      var cell = document.createElement('td');
      if (!contact.id) {
        var missing = document.createElement('span');
        missing.className = 'missing';
        missing.textContent = '-';
        cell.appendChild(missing);
        row.appendChild(cell);
        return;
      }

      var input = document.createElement('input');
      var value = contact[suffix.toLowerCase()] || '';
      input.className = 'contact-input';
      input.type = type;
      input.value = value;
      input.setAttribute('data-contact-id', contact.id);
      input.setAttribute('data-field', 'Contact' + (contact.position || 1) + suffix);
      input.setAttribute('data-original', value);
      cell.appendChild(input);
      row.appendChild(cell);
    }

    function appendCell(row, text) {
      var cell = document.createElement('td');
      cell.textContent = text;
      row.appendChild(cell);
      return cell;
    }


    function bindAuthorizationDetailModal() {
      var modal = document.getElementById('authorization-detail-modal');
      if (!modal) return;
      var close = modal.querySelector('.modal-close');
      if (close) close.addEventListener('click', closeAuthorizationDetail);
      modal.addEventListener('click', function(event) {
        if (event.target === modal) closeAuthorizationDetail();
      });
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') closeAuthorizationDetail();
      });
    }

    function bindNavigation() {
      document.querySelectorAll('[data-view]').forEach(function(link) {
        link.addEventListener('click', function(event) {
          event.preventDefault();
          var viewName = link.getAttribute('data-view');
          if (viewName === 'autoritzacions' && !state.authorizationsLoaded) {
            loadAuthorizations();
          }
          if (viewName === 'contactes') {
            loadVisibleContactsIfNeeded();
          }

          document.querySelectorAll('[data-view]').forEach(function(item) {
            item.classList.toggle('active', item === link);
          });

          document.querySelectorAll('.view').forEach(function(view) {
            view.classList.toggle('active', view.id === 'view-' + viewName);
          });

          updateSaveButton();
        });
      });
    }

    function isViewActive(viewName) {
      var view = document.getElementById('view-' + viewName);
      return !!(view && view.classList.contains('active'));
    }

    function bindSorting() {
      document.querySelectorAll('[data-sort-table]').forEach(function(button) {
        button.addEventListener('click', function() {
          var tableId = button.getAttribute('data-sort-table');
          var key = button.getAttribute('data-sort-key');
          var currentDirection = tableId === 'contacts-table' && state.contactSort && state.contactSort.key === key
            ? state.contactSort.direction
            : (button.classList.contains('sorted-asc') ? 'asc' : '');
          var direction = currentDirection === 'asc' ? 'desc' : 'asc';

          document.querySelectorAll('[data-sort-table="' + tableId + '"]').forEach(function(item) {
            item.classList.remove('sorted-asc', 'sorted-desc');
          });
          button.classList.add(direction === 'asc' ? 'sorted-asc' : 'sorted-desc');

          if (tableId === 'contacts-table') {
            state.contactSort = { key: key, direction: direction };
            renderContacts(filteredContacts());
            updateSaveButton();
            return;
          }

          sortRows(tableId, key, direction);
          syncAuthorizationFloatingScroll();
        });
      });
      updateContactSortButtons_();
    }

    function updateContactSortButtons_() {
      document.querySelectorAll('[data-sort-table="contacts-table"]').forEach(function(button) {
        var active = state.contactSort && button.getAttribute('data-sort-key') === state.contactSort.key;
        button.classList.toggle('sorted-asc', active && state.contactSort.direction === 'asc');
        button.classList.toggle('sorted-desc', active && state.contactSort.direction === 'desc');
      });
    }

    function sortRows(tableId, key, direction) {
      var tbody = document.getElementById(tableId);
      if (!tbody) return;

      var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
      var multiplier = direction === 'asc' ? 1 : -1;

      rows.sort(function(a, b) {
        var aValue = a.getAttribute('data-' + key) || '';
        var bValue = b.getAttribute('data-' + key) || '';

        if (key === 'age') {
          return compareNumber(aValue, bValue) * multiplier;
        }

        return aValue.localeCompare(bValue, 'ca', { sensitivity: 'base' }) * multiplier;
      });

      rows.forEach(function(row) {
        tbody.appendChild(row);
      });
    }

    function compareNumber(aValue, bValue) {
      var aNumber = aValue === '' ? Number.POSITIVE_INFINITY : Number(aValue);
      var bNumber = bValue === '' ? Number.POSITIVE_INFINITY : Number(bValue);
      return aNumber - bNumber;
    }

    function bindContactInputs() {
      document.querySelectorAll('.contact-input').forEach(function(input) {
        input.addEventListener('input', function() {
          input.classList.remove('invalid');
          var row = input.closest('[data-contact-row]');
          row.classList.toggle('dirty-row', rowHasChanges(row));
          updateSaveButton();
        });
      });
    }

    function bindSaveButton() {
      if (saveButton) {
        saveButton.addEventListener('click', saveContactChanges);
      }
    }

    function bindAuthorizationFloatingScroll() {
      if (!authorizationFloatingScroll || !authorizationTableWrap) return;
      var syncing = false;
      authorizationFloatingScroll.addEventListener('scroll', function() {
        if (syncing) return;
        syncing = true;
        authorizationTableWrap.scrollLeft = authorizationFloatingScroll.scrollLeft;
        syncing = false;
      });
      authorizationTableWrap.addEventListener('scroll', function() {
        if (syncing) return;
        syncing = true;
        authorizationFloatingScroll.scrollLeft = authorizationTableWrap.scrollLeft;
        syncing = false;
      });
      window.addEventListener('resize', syncAuthorizationFloatingScroll);
    }

    function updateAuthorizationFloatingScroll() {
      if (!authorizationFloatingScroll) return;
      var active = document.getElementById('view-autoritzacions') && document.getElementById('view-autoritzacions').classList.contains('active');
      authorizationFloatingScroll.classList.toggle('is-hidden', !active);
      if (active) syncAuthorizationFloatingScroll();
    }

    function syncAuthorizationFloatingScroll() {
      if (!authorizationFloatingScroll || !authorizationTableWrap) return;
      var inner = authorizationFloatingScroll.firstElementChild;
      if (!inner) return;
      inner.style.width = authorizationTableWrap.scrollWidth + 'px';
      authorizationFloatingScroll.scrollLeft = authorizationTableWrap.scrollLeft;
    }

    function rowHasChanges(row) {
      return Array.prototype.some.call(row.querySelectorAll('.contact-input'), function(input) {
        return input.value !== input.getAttribute('data-original');
      });
    }

    function getDirtyRows() {
      return Array.prototype.slice.call(document.querySelectorAll('[data-contact-row].dirty-row'));
    }

    function updateSaveButton() {
      if (!saveButton) return;
      var contactesActive = document.getElementById('view-contactes') && document.getElementById('view-contactes').classList.contains('active');
      saveButton.classList.toggle('is-hidden', !contactesActive);
      saveButton.disabled = !contactesActive || state.saving || getDirtyRows().length === 0;
      updateInvitationControls();
    }

    function collectChanges() {
      var changes = [];

      getDirtyRows().forEach(function(row) {
        var studentId = row.getAttribute('data-student-id');

        row.querySelectorAll('.contact-input').forEach(function(input) {
          var oldValue = input.getAttribute('data-original');
          var newValue = input.value.trim();

          if (oldValue !== newValue) {
            changes.push({
              studentId: studentId,
              contactId: input.getAttribute('data-contact-id'),
              fieldChanged: input.getAttribute('data-field'),
              oldValue: oldValue,
              newValue: newValue,
              input: input
            });
          }
        });
      });

      return changes;
    }

    function validateChanges(changes) {
      var errors = [];

      changes.forEach(function(change) {
        change.input.classList.remove('invalid');

        if (/Email$/.test(change.fieldChanged) && !isValidEmail(change.newValue)) {
          errors.push('Email no vàlid: ' + change.newValue);
          change.input.classList.add('invalid');
        }

        if (/Phone$/.test(change.fieldChanged) && !isValidPhone(change.newValue)) {
          errors.push('Telèfon no vàlid: ' + change.newValue);
          change.input.classList.add('invalid');
        }
      });

      return errors;
    }

    function isValidEmail(value) {
      var text = String(value || '').trim();
      return !text || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text);
    }

    function isValidPhone(value) {
      var text = String(value || '').trim();
      if (!text) return true;

      var compact = text.replace(/[\s().-]/g, '');
      if (/^\+\d{8,15}$/.test(compact)) return true;
      if (/^00\d{8,15}$/.test(compact)) return true;
      return /^[6789]\d{8}$/.test(compact);
    }

    function saveContactChanges() {
      if (state.saving) return;

      var collected = collectChanges();
      var errors = validateChanges(collected);

      if (errors.length) {
        alert(errors.join('\n'));
        return;
      }

      var changes = collected.map(function(change) {
        return {
          studentId: change.studentId,
          contactId: change.contactId,
          fieldChanged: change.fieldChanged,
          oldValue: change.oldValue,
          newValue: change.newValue
        };
      });

      if (!changes.length) {
        updateSaveButton();
        return;
      }

      state.saving = true;
      setSaveLoading(true);
      updateSaveButton();

      google.script.run
        .withSuccessHandler(function(result) {
          (result && result.changes ? result.changes : []).forEach(function(change) {
            var selector = '.contact-input[data-contact-id="' + cssEscape(change.contactId) + '"][data-field="' + cssEscape(change.fieldChanged) + '"]';
            document.querySelectorAll(selector).forEach(function(input) {
              input.value = change.newValue;
              input.setAttribute('data-original', change.newValue);
              input.classList.remove('invalid');
              var row = input.closest('[data-contact-row]');
              if (row) {
                row.classList.toggle('dirty-row', rowHasChanges(row));
              }
            });
          });

          getDirtyRows().forEach(function(row) {
            if (!rowHasChanges(row)) {
              row.classList.remove('dirty-row');
            }
          });

          state.saving = false;
          setSaveLoading(false);
          updateSaveButton();
        })
        .withFailureHandler(function(error) {
          alert("No s'han pogut desar els canvis: " + (error && error.message ? error.message : error));
          state.saving = false;
          setSaveLoading(false);
          updateSaveButton();
        })
        .saveContactChanges(changes);
    }

    function setInitialLoading(isLoading) {
      if (!initialLoading) return;
      initialLoading.classList.toggle('is-hidden', !isLoading);
    }

    function setSaveLoading(isLoading) {
      if (!saveLoading) return;
      saveLoading.hidden = !isLoading;
    }

    function cssEscape(value) {
      return String(value || '').replace(/["\\]/g, '\\$&');
    }
  })();
</script>
