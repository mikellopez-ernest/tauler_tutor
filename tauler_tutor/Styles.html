<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --surface-muted: #edf1f5;
    --line: #d9e0e8;
    --text: #17202a;
    --muted: #617080;
    --accent: #0f766e;
    --accent-dark: #115e59;
    --dirty: #fff3d6;
    --dirty-line: #f59e0b;
    --danger: #b42318;
    --shadow: 0 16px 40px rgba(21, 34, 50, 0.10);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, Roboto, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }

  .is-hidden {
    display: none !important;
  }

  .app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
  }

  .sidebar {
    background: #15202b;
    color: #fff;
    padding: 24px 18px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    display: inline-grid;
    place-items: center;
    background: var(--accent);
    font-weight: 800;
  }

  .brand-text {
    font-weight: 700;
  }

  .nav {
    display: grid;
    gap: 6px;
  }

  .nav-link {
    color: #dce5ec;
    text-decoration: none;
    border-radius: 6px;
    padding: 10px 12px;
    font-weight: 600;
  }

  .nav-link:hover,
  .nav-link.active {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
  }

  .main {
    padding: 32px;
    min-width: 0;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .page-header {
    margin-bottom: 26px;
  }

  .eyebrow {
    margin: 0 0 6px;
    color: var(--accent-dark);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 8px;
    font-size: 32px;
    line-height: 1.15;
  }

  h2 {
    margin-bottom: 0;
    font-size: 20px;
  }

  .subtle,
  .empty {
    color: var(--muted);
  }

  .table-section {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }

  .count {
    color: var(--muted);
    font-weight: 700;
  }

  .table-wrap {
    overflow-x: auto;
  }

  .authorizations-scroll {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    white-space: nowrap;
  }

  th {
    background: var(--surface-muted);
    color: #344354;
    font-size: 13px;
  }

  th[colspan] {
    text-align: center;
  }

  .sort-button {
    width: 100%;
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    padding: 0;
    text-align: left;
  }

  .sort-button::after {
    color: var(--muted);
    content: "↕";
    margin-left: 6px;
  }

  .sort-button.sorted-asc::after {
    content: "↑";
  }

  .sort-button.sorted-desc::after {
    content: "↓";
  }

  tr:last-child td {
    border-bottom: 0;
  }

  tr.dirty-row td {
    background: var(--dirty);
    box-shadow: inset 3px 0 0 var(--dirty-line);
  }

  tr.student-band-even td {
    background: #fff;
  }

  tr.student-band-odd td {
    background: #f8fafc;
  }

  tr.student-band-even.dirty-row td,
  tr.student-band-odd.dirty-row td {
    background: var(--dirty);
  }

  .contacts-table input {
    width: 100%;
    min-width: 150px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font: inherit;
    padding: 7px 8px;
  }

  .contacts-table input:focus {
    border-color: var(--accent);
    background: #fff;
    outline: none;
  }

  .contacts-table input.invalid {
    border-color: var(--danger);
    background: #fff5f5;
  }

  .missing {
    color: var(--muted);
  }

  .save-button {
    position: fixed;
    right: 28px;
    bottom: 28px;
    z-index: 20;
    width: 58px;
    height: 58px;
    border: 0;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: var(--shadow);
    color: #fff;
    cursor: pointer;
    font-size: 25px;
    line-height: 1;
  }

  .save-button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: grid;
    place-items: center;
    background: rgba(246, 247, 249, 0.62);
  }

  .loading-overlay[hidden] {
    display: none;
  }

  .loader {
    width: 54px;
    height: 54px;
    border: 6px solid #d9e0e8;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .empty {
    padding: 20px;
    margin: 0;
  }

  .error-page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .error-box {
    width: min(680px, 100%);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 28px;
  }

  .error-box h1 {
    color: var(--danger);
  }

  pre {
    margin: 18px 0 0;
    max-height: 220px;
    overflow: auto;
    border-radius: 6px;
    background: #f8fafc;
    color: #3d4a5c;
    padding: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }



  .authorizations-table {
    min-width: 1780px;
  }

  .authorizations-table th,
  .authorizations-table td {
    text-align: center;
    padding-left: 12px;
    padding-right: 12px;
  }

  .authorizations-table th:first-child,
  .authorizations-table td:first-child {
    text-align: left;
    min-width: 210px;
  }

  tr.missing-authorization td {
    background: #fff1f1;
  }

  .rocket-button {
    width: 30px;
    height: 30px;
    margin-right: 8px;
    border: 1px solid #f0b4b4;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }

  .rocket-button:disabled {
    cursor: wait;
    opacity: .55;
  }

  .icon-ok {
    color: #087443;
    font-weight: 900;
  }

  .icon-no {
    color: var(--danger);
    font-weight: 900;
  }

  .icon-empty {
    color: var(--muted);
  }



  .detail-button {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--accent-dark);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 800;
    padding: 6px 10px;
  }

  .detail-button:hover {
    border-color: var(--accent);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    background: rgba(15, 23, 42, 0.42);
    padding: 22px;
  }

  .modal-panel {
    width: min(760px, 100%);
    max-height: min(760px, calc(100vh - 44px));
    overflow: auto;
    border-radius: 8px;
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .modal-header {
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    padding: 18px 20px;
  }

  .modal-header h2 {
    margin: 0;
  }

  .modal-close {
    width: 34px;
    height: 34px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
  }

  .modal-body {
    padding: 20px;
  }

  .detail-section {
    border-bottom: 1px solid var(--line);
    padding: 0 0 16px;
    margin-bottom: 16px;
  }

  .detail-section:last-child {
    border-bottom: 0;
    margin-bottom: 0;
  }

  .detail-section h3 {
    margin: 0 0 10px;
    font-size: 15px;
  }

  .detail-section dl {
    display: grid;
    grid-template-columns: 170px minmax(0, 1fr);
    gap: 8px 14px;
    margin: 0;
  }

  .detail-section dt {
    color: var(--muted);
    font-weight: 800;
  }

  .detail-section dd {
    margin: 0;
    white-space: normal;
  }

  .auth-error {
    margin: 14px 20px;
    border: 1px solid #f0b4b4;
    border-radius: 6px;
    background: #fff1f1;
    color: var(--danger);
    padding: 10px 12px;
  }

  @media (max-width: 760px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      padding: 16px;
    }

    .nav {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .nav-link {
      text-align: center;
      padding: 9px 6px;
      font-size: 13px;
    }

    .main {
      padding: 22px 16px;
    }

    h1 {
      font-size: 27px;
    }

    th,
    td {
      padding: 11px 14px;
    }

    .save-button {
      right: 18px;
      bottom: 18px;
    }
  }
</style>
