<script>
// Inicialització de la interfície multilingüe.
window.addEventListener('DOMContentLoaded', () => {
  const initialData = window.INITIAL_FORM_DATA || {};
  I18n.init({ defaultLanguage: initialData.idioma_formulari || 'ca', storageKey: 'autoritzacionsIdioma' });
  fillForm(initialData);
  setupRespondentStep();
  setupAuthorizedPeopleVisibility();
  setupExternalPlatformsDependency();
  applyFormMode(initialData);
});

const form = document.getElementById('authorizationForm');
const SUCCESS_REDIRECT_URL = 'https://agora.xtec.cat/sesernestlluch-cunit/';
let currentFormMode = '';
let personCounter = 0;
const typeConfig = {
  eso_menor14: {code:'A1746-V01-26', subtitle:"Escolarització de l'alumnat menor de catorze anys", responsible:true, studentSignature:false, esoExit:true, recess:false, academic:false, municipal:true, healthConsent:false, paracetamol:true, tis:true},
  eso_14_17: {code:'A1747-V01-26', subtitle:"Escolarització de l'alumnat de catorze a disset anys", responsible:true, studentSignature:true, esoExit:true, recess:false, academic:false, municipal:true, healthConsent:false, paracetamol:true, tis:false},
  batx_menor18: {code:'A1749-V01-26', subtitle:"Escolarització de l'alumnat de batxillerat menor de divuit anys", responsible:true, studentSignature:true, esoExit:false, recess:true, academic:false, municipal:true, healthConsent:true, paracetamol:false, tis:false},
  post_menor18: {code:'A1748-V01-26', subtitle:"Escolarització de l'alumnat d'ensenyaments postobligatoris menor de divuit anys", responsible:true, studentSignature:true, esoExit:false, recess:true, academic:false, municipal:true, healthConsent:true, paracetamol:false, tis:false},
  major18: {code:'A1750-V01-26', subtitle:"Escolarització de l'alumnat major de divuit anys", responsible:false, studentSignature:true, esoExit:false, recess:false, academic:true, municipal:false, healthConsent:true, paracetamol:false, tis:false}
};

const modelLabels = {
  eso_menor14: 'ESO — menor de 14 anys',
  eso_14_17: 'ESO — de 14 a 17 anys',
  batx_menor18: 'Batxillerat — menor de 18 anys',
  post_menor18: 'FP / altres postobligatoris — menor de 18 anys',
  major18: 'Alumnat major de 18 anys'
};

function selectModelFromSetup() {
  const studies = document.getElementById('studyType').value;
  const adult = document.getElementById('isAdult').value;
  const age14 = document.getElementById('is14Plus').value;
  const ageWrap = document.getElementById('age14Wrapper');
  const message = document.getElementById('modelSelectionMessage');
  ageWrap.classList.toggle('is-hidden', studies !== 'eso' || adult === 'si');

  let model = '';
  if (adult === 'si') model = 'major18';
  else if (adult === 'no' && studies === 'batx') model = 'batx_menor18';
  else if (adult === 'no' && studies === 'fp') model = 'post_menor18';
  else if (adult === 'no' && studies === 'eso' && age14 === 'si') model = 'eso_14_17';
  else if (adult === 'no' && studies === 'eso' && age14 === 'no') model = 'eso_menor14';

  document.querySelectorAll('[name="tipus_alumne"]').forEach(r => r.checked = r.value === model);
  if (model) {
    message.textContent = 'Model seleccionat: ' + modelLabels[model];
    message.classList.remove('is-hidden');
    applyType();
  } else {
    message.classList.add('is-hidden');
  }
}
['studyType','isAdult','is14Plus'].forEach(id => document.getElementById(id).addEventListener('change', selectModelFromSetup));

function setSetupFromModel(model) {
  if (!model) return;
  const studies = model.startsWith('eso_') ? 'eso' : model.startsWith('batx_') ? 'batx' : model.startsWith('post_') ? 'fp' : '';
  document.getElementById('studyType').value = studies;
  document.getElementById('isAdult').value = model === 'major18' ? 'si' : 'no';
  document.getElementById('is14Plus').value = model === 'eso_14_17' ? 'si' : model === 'eso_menor14' ? 'no' : '';
  selectModelFromSetup();
}



function escapeHtml(value) { return String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function setBlock(id, show) { const el=document.getElementById(id); el.classList.toggle('is-hidden', !show); el.querySelectorAll('input,select,textarea').forEach(x=>x.disabled=!show); }

function addAuthorizedPerson(data={}) {
  if (personCounter >= 8) return;
  personCounter++;
  const row=document.createElement('div'); row.className='row g-2 align-items-end authorized-person';
  row.innerHTML=`<div class="col-md-6"><label class="form-label small">Nom i cognoms</label><input class="form-control" name="persona_autoritzada_nom_${personCounter}" value="${escapeHtml(data.nom||'')}"></div><div class="col-md-5"><label class="form-label small">En qualitat de</label><input class="form-control" name="persona_autoritzada_qualitat_${personCounter}" value="${escapeHtml(data.qualitat||'')}"></div><div class="col-md-1 no-print"><button class="btn btn-outline-danger w-100" type="button" aria-label="Elimina persona">×</button></div>`;
  row.querySelector('button').addEventListener('click',()=>row.remove()); document.getElementById('authorizedPeople').appendChild(row);
}
document.getElementById('addPerson').addEventListener('click',()=>addAuthorizedPerson());


function clearAuthorizedPeople() {
  document.getElementById('authorizedPeople').textContent = '';
  personCounter = 0;
}

function setAuthorizedPeopleVisible(show) {
  const block = document.getElementById('authorizedPeopleBlock');
  block.classList.toggle('is-hidden', !show);
  block.querySelectorAll('input,select,textarea,button').forEach(field => field.disabled = !show);
  if (show && !document.querySelector('.authorized-person')) addAuthorizedPerson();
  if (!show) clearAuthorizedPeople();
}

function setupAuthorizedPeopleVisibility() {
  document.querySelectorAll('[name="sortida_sola"]').forEach(input => {
    input.addEventListener('change', () => setAuthorizedPeopleVisible(document.getElementById('sortidaSolaNo').checked));
  });
  setAuthorizedPeopleVisible(document.getElementById('sortidaSolaNo').checked);
}

function setExternalPlatformsVisible(show) {
  const block = document.getElementById('externalPlatformsDetail');
  const input = document.getElementById('plataformesExternes');
  block.classList.toggle('is-hidden', !show);
  input.disabled = !show;
  if (!show) input.value = '';
}

function setupExternalPlatformsDependency() {
  document.querySelectorAll('[name="imatge_externa"]').forEach(input => {
    input.addEventListener('change', () => setExternalPlatformsVisible(document.getElementById('imatgeExternaSi').checked));
  });
  setExternalPlatformsVisible(document.getElementById('imatgeExternaSi').checked);
}

function applyType() {
  const type=form.querySelector('[name="tipus_alumne"]:checked')?.value;
  const cfg=typeConfig[type];
  if(!cfg) return;
  document.getElementById('documentSubtitle').textContent=cfg.subtitle;
  document.getElementById('documentCode').value=cfg.code;
  document.getElementById('documentCodeText').textContent=cfg.code;
  document.getElementById('alumneDocLabel').textContent=cfg.tis?'DNI/NIE/Passaport/TIS':'DNI/NIE/Passaport';
  setBlock('responsableFields',cfg.responsible);
  document.getElementById('responsableNom').required=cfg.responsible;
  setBlock('esoExitBlock',cfg.esoExit);
  setBlock('recessExitBlock',cfg.recess);
  setBlock('academicCommunicationBlock',cfg.academic);
  setBlock('municipalTripsBlock',cfg.municipal);
  setBlock('healthCommunicationBlock',cfg.healthConsent);
  setBlock('paracetamolBlock',cfg.paracetamol);
  document.getElementById('signatureResponsibleData').value=cfg.responsible?'true':'false';
  document.getElementById('signatureStudentData').value='false';
}
document.querySelectorAll('[name="tipus_alumne"]').forEach(x=>x.addEventListener('change',()=>{applyType();setSetupFromModel(x.value);}));

function formToObject(){ updateSignatureFields(); const out={}; for(const [k,v] of new FormData(form).entries()) out[k]=v; out.curs_inici=document.getElementById('cursInici').value; out.curs_fi=document.getElementById('cursFi').value; out.idioma_formulari=I18n.currentLanguage||'ca'; out.form_mode=currentFormMode||document.getElementById('formMode').value||''; if(out.verified_actor_type==='student'&&out.isAdult==='si') out.signatura_alumne='true'; return out; }
function fillForm(data){
  Object.keys(data||{}).filter(key=>/^persona_autoritzada_nom_\d+$/.test(key)).sort((a,b)=>Number(a.match(/\d+$/)[0])-Number(b.match(/\d+$/)[0])).forEach(key=>{
    const index=key.match(/\d+$/)[0];
    addAuthorizedPerson({nom:data[key]||'', qualitat:data['persona_autoritzada_qualitat_'+index]||''});
  });
  Object.entries(data||{}).forEach(([key,value])=>{
    if(key==='curs_inici'||key==='curs_fi'){document.getElementById(key==='curs_inici'?'cursInici':'cursFi').value=value;return;}
    if(key==='studyType'||key==='isAdult'||key==='is14Plus'){document.getElementById(key).value=value;return;}
    if(key==='id_student'){document.getElementById('idStudent').value=value;return;}
    if(key==='form_mode'||key==='mode'){document.getElementById('formMode').value=value;currentFormMode=value;return;}
    if(key==='resposta_id'){document.getElementById('responseId').value=value;return;}
    if(key==='verified_actor_type'){document.getElementById('verifiedActorType').value=value;return;}
    if(key==='verified_dinantia_account_id'){document.getElementById('verifiedDinantiaAccountId').value=value;return;}
    if(key==='verified_email'){document.getElementById('verifiedEmail').value=value;return;}
    if(key==='launcher_token'){document.getElementById('launcherToken').value=value;return;}
    if(key==='responent_nom_sencer'){document.getElementById('responentNomSencer').value=value;document.getElementById('hiddenRespondentName').value=value;}
    if(key==='responent_telefon'){document.getElementById('responentTelefon').value=value;document.getElementById('hiddenRespondentPhone').value=value;}
    if(/^persona_autoritzada_/.test(key)) return;
    form.querySelectorAll(`[name="${CSS.escape(key)}"]`).forEach(field=>{if(field.type==='radio'||field.type==='checkbox') field.checked=field.value===value||value===true; else if(!key.startsWith('signatura_')) field.value=value;});
  });
  selectModelFromSetup();
  if(data.tipus_alumne) setSetupFromModel(data.tipus_alumne);
  setAuthorizedPeopleVisible(document.getElementById('sortidaSolaNo').checked);
  setExternalPlatformsVisible(document.getElementById('imatgeExternaSi').checked);
}

document.getElementById('saveLocal')?.addEventListener('click',()=>{localStorage.setItem('autoritzacionsForm5Models',JSON.stringify(formToObject()));alert('Formulari desat en aquest navegador.');});
document.getElementById('loadLocal')?.addEventListener('click',()=>{const raw=localStorage.getItem('autoritzacionsForm5Models');if(!raw)return alert('No hi ha cap còpia desada.');fillForm(JSON.parse(raw));});
document.getElementById('downloadJson')?.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(formToObject(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`autoritzacions_${document.getElementById('alumneNom').value.trim().replace(/\s+/g,'_')||'formulari'}.json`;a.click();URL.revokeObjectURL(a.href);});
form.addEventListener('submit',e=>{e.preventDefault();e.stopPropagation();form.classList.add('was-validated');if(!form.querySelector('[name="tipus_alumne"]:checked')){alert('Completa la configuració inicial per seleccionar el model aplicable.');return;}if(!form.checkValidity()){document.querySelector(':invalid')?.focus();return;}submitForm();});

function setupRespondentStep(){
  document.getElementById('respondentNext').addEventListener('click',()=>{
    const name=document.getElementById('responentNomSencer').value.trim();
    const phone=document.getElementById('responentTelefon').value.trim();
    const error=document.getElementById('respondentError');
    error.classList.add('is-hidden');
    if(!name||!phone||!isValidPhone(phone)){
      error.textContent='Indica el nom sencer i un telèfon vàlid per continuar.';
      error.classList.remove('is-hidden');
      return;
    }
    document.getElementById('hiddenRespondentName').value=name;
    document.getElementById('hiddenRespondentPhone').value=phone;
    document.getElementById('respondentStep').classList.add('is-hidden');
    document.getElementById('initialSetup').classList.remove('is-hidden');
    form.classList.remove('is-hidden');
  });
}

function applyFormMode(data) {
  currentFormMode = data.form_mode || data.mode || currentFormMode || '';
  const skipRespondent = ['edit_owner','readonly','readonly_print','student_confirm'].includes(currentFormMode);
  if (skipRespondent) {
    document.getElementById('respondentStep').classList.add('is-hidden');
    document.getElementById('initialSetup').classList.add('is-hidden');
    form.classList.remove('is-hidden');
  }
  if (currentFormMode === 'edit_owner') {
    document.getElementById('submitForm').textContent = 'Desa els canvis';
  }
  if (['readonly','readonly_print','student_confirm'].includes(currentFormMode)) {
    setReadOnlyMode(currentFormMode === 'student_confirm');
  }
}

function setReadOnlyMode(allowStudentConfirm) {
  document.querySelectorAll('.translate-box input,.translate-box select,#authorizationForm input,#authorizationForm select,#authorizationForm textarea,#authorizationForm button').forEach(field => {
    field.disabled = true;
  });
  document.querySelectorAll('.accordion-collapse').forEach(section => section.classList.add('show'));
  document.querySelectorAll('.accordion-button').forEach(button => {
    button.classList.remove('collapsed');
    button.disabled = false;
  });
  const actions = document.querySelector('.sticky-actions .d-flex');
  actions.textContent = '';
  const printButton = document.createElement('button');
  printButton.className = 'btn btn-outline-secondary';
  printButton.type = 'button';
  printButton.textContent = 'Imprimeix';
  printButton.addEventListener('click', () => window.print());
  actions.appendChild(printButton);
  if (allowStudentConfirm) {
    const confirmButton = document.createElement('button');
    confirmButton.className = 'btn btn-primary';
    confirmButton.type = 'button';
    confirmButton.textContent = 'Confirmo';
    confirmButton.addEventListener('click', confirmStudentAuthorization);
    actions.appendChild(confirmButton);
  }
}

function confirmStudentAuthorization() {
  const token = document.getElementById('launcherToken').value;
  const respostaId = document.getElementById('responseId').value;
  const launcherUrl = (window.INITIAL_FORM_DATA || {}).launcher_url || '';
  if (!token || !respostaId || !launcherUrl) {
    alert('No s ha pogut confirmar: falten dades de verificació.');
    return;
  }
  const formPost = document.createElement('form');
  formPost.method = 'post';
  formPost.action = launcherUrl;
  [['action','confirm_student'],['token',token],['resposta_id',respostaId]].forEach(([name,value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = name;
    input.value = value;
    formPost.appendChild(input);
  });
  document.body.appendChild(formPost);
  formPost.submit();
}

function isValidPhone(value){const compact=String(value||'').trim().replace(/[\s().-]/g,'');return /^\+?\d{8,15}$/.test(compact)||/^00\d{8,15}$/.test(compact)||/^[6789]\d{8}$/.test(compact);}

function submitForm(){
  const button=document.getElementById('submitForm');
  button.disabled=true;
  button.textContent='Enviant...';
  google.script.run.withSuccessHandler(result=>{
    button.textContent='Enviat';
    alert('Formulari enviat correctament. Codi: '+(result&&result.resposta_id?result.resposta_id:''));
    window.top.location.href = SUCCESS_REDIRECT_URL;
  }).withFailureHandler(error=>{
    button.disabled=false;
    button.textContent='Envia el formulari';
    alert('No s ha pogut enviar el formulari: '+(error&&error.message?error.message:error));
  }).submitAuthorizationResponse(formToObject());
}


function updateSignatureFields(){const cfg=typeConfig[form.querySelector('[name="tipus_alumne"]:checked')?.value];document.getElementById('signatureResponsibleData').value=cfg?.responsible?'true':'false';document.getElementById('signatureStudentData').value='false';}
document.getElementById('dataSignatura').valueAsDate=new Date();
</script>
