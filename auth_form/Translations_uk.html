    "Derivar als serveis sanitaris qualsevol lesió o patologia quan sigui raonable, col·laborar amb l'AFA i revisar i millorar l'acció educativa amb aportacions de la comunitat.": "За потреби направляти травми або захворювання до медичних служб, співпрацювати з AFA та переглядати й покращувати освітню діяльність із внеском спільноти.",
    "Realitzar activitats que fomentin hàbits saludables i la pràctica d'activitat física i esportiva.": "Проводити заходи, що сприяють здоровим звичкам, фізичній активності та спорту.",
    "Per part de la família i l'alumne/a": "З боку сім’ї та учня/учениці",
    "Respectar el sistema educatiu català, el caràcter propi de l'institut i l'autoritat del tutor/a, del professorat i de l'equip directiu.": "Поважати каталонську систему освіти, характер закладу та авторитет куратора, педагогічного складу й керівництва.",
    "Compartir amb el centre l'educació de l'alumne/a i afavorir el seu desenvolupament acadèmic i personal.": "Спільно із закладом дбати про освіту учня/учениці та підтримувати його/її академічний і особистий розвиток.",
    "Considerar les recomanacions del centre relatives a atenció educativa, derivacions, repetició o promoció de curs i orientació acadèmica.": "Брати до уваги рекомендації закладу щодо освітньої підтримки, направлень, повторення або переведення курсу та академічної орієнтації.",
    "Instar l'alumne/a a respectar les normes de funcionament del centre, el deure d'estudi, el respecte als altres i les normes de convivència.": "Заохочувати учня/ученицю дотримуватися правил закладу, обов’язку навчатися, поваги до інших і правил співіснування.",
    "Facilitar a l'institut informacions rellevants per al procés d'aprenentatge i la salut de l'alumne/a.": "Надавати закладу інформацію, важливу для навчального процесу та здоров’я учня/учениці.",
    "Aportar documents de justificació oficial en cas d'absència.": "Надавати офіційні підтвердні документи у разі відсутності.",
    "No enviar l'alumne/a a l'institut quan tingui febre, malalties contagioses, infeccions per polls o causes equivalents, i recollir-lo personalment o mitjançant una persona major d'edat autoritzada quan calgui.": "Не відправляти учня/ученицю до закладу за наявності температури, заразних хвороб, педикульозу або подібних причин, а за потреби забирати особисто або через уповноважену повнолітню особу.",
    "Atendre en un període raonable les peticions d'entrevista o comunicació del centre i assistir puntualment a les reunions.": "У розумний строк відповідати на запити закладу щодо зустрічей або комунікації та приходити на зустрічі вчасно.",
    "Respectar les NOFC i la regulació dels telèfons mòbils.": "Дотримуватися NOFC і правил використання мобільних телефонів.",
    "Informar l'alumne/a menor d'edat de la signatura d'aquesta Carta de compromís educatiu i del que implica.": "Повідомити неповнолітнього учня/ученицю про підписання цієї Освітньої угоди та її наслідки.",
    "I perquè així consti, ho signem a tots els efectes, a partir de la data d'avui.": "На підтвердження цього ми підписуємо документ для всіх цілей від сьогоднішньої дати.",
    "He llegit i accepto la Carta de compromís educatiu.": "Я прочитав/прочитала й приймаю Освітню угоду.",
    "7. Normativa d'ús de telèfons mòbils": "7. Правила використання мобільних телефонів",
    "Normativa d'ús de telèfons mòbils": "Правила використання мобільних телефонів",
    "Arran de l'aprovació de l'actualització de les NOFC, us informem de la normativa que regularà l'ús dels telèfons mòbils a l'institut Ernest Lluch i Martín.": "Після затвердження оновлення NOFC повідомляємо вам правила, що регулюватимуть використання мобільних телефонів в Institut Ernest Lluch i Martín.",
    "El centre entén que no hi ha cap urgència que justifiqui la utilització del telèfon mòbil. L'institut disposa de telèfon i personal de consergeria per agilitzar qualsevol informació que hagi d'arribar de les famílies a l'alumnat i viceversa.": "Заклад вважає, що немає жодної термінової потреби, яка виправдовує використання мобільного телефону. У закладі є телефон і персонал рецепції, щоб оперативно передавати інформацію між сім’ями та учнями.",
    "L'ús de telèfons mòbils està prohibit per a l'alumnat en tots els espais del centre educatiu i en totes les activitats educatives que puguin tenir lloc fora del centre. La tinència del dispositiu només és possible si està completament apagat en entrar al centre i si l'institut té constància escrita del consentiment familiar.": "Використання мобільних телефонів учнями заборонено в усіх приміщеннях закладу та на всіх освітніх заходах поза ним. Наявність пристрою можлива лише якщо він повністю вимкнений при вході до закладу і якщо заклад має письмову згоду сім’ї.",
    "Aquestes indicacions també s'han de complir en activitats fora del centre: sortides, colònies, viatges, projectes compartits, activitats amb famílies o comunitat educativa, extraescolars i activitats amb entitats de l'entorn.": "Ці вказівки також потрібно виконувати під час заходів поза закладом: виїздів, таборів, подорожей, спільних проєктів, заходів із сім’ями або освітньою спільнотою, позакласних заходів та заходів із місцевими організаціями.",
    "Estudis postobligatoris": "Післяобов’язкова освіта",
    "L'alumnat d'estudis postobligatoris ha de fer un ús responsable dels dispositius mòbils i vincular-los a les activitats d'aprenentatge quan el professorat ho indiqui.": "Учні післяобов’язкових програм мають відповідально використовувати мобільні пристрої та пов’язувати їх з навчальною діяльністю, коли це вказує викладач.",
    "Excepcionalitats": "Винятки",
    "Salut: es permet utilitzar un dispositiu quan l'alumnat tingui una necessitat específica per motius de salut.": "Здоров’я: пристрій можна використовувати, коли учень/учениця має специфічну потребу за станом здоров’я.",
    "NESE: es permet utilitzar un dispositiu quan sigui necessari per facilitar l'accés a l'aprenentatge, la participació o la comunicació.": "NESE: пристрій можна використовувати, коли він потрібен для доступу до навчання, участі або комунікації.",
    "Emergències: en una situació d'emergència, l'alumnat pot utilitzar el telèfon mòbil per comunicar-se amb la família.": "Надзвичайні ситуації: у надзвичайній ситуації учень/учениця може використати мобільний телефон для зв’язку з сім’єю.",
    "Mesures correctores i sancions": "Коригувальні заходи та санкції",
    "L'ús del telèfon mòbil sense consentiment previ d'un docent pot constituir una falta lleu si no afecta drets fonamentals o protecció de dades.": "Використання мобільного телефону без попередньої згоди викладача може бути легким порушенням, якщо не зачіпає основні права або захист даних.",
    "L'ús que vulneri drets fonamentals pot constituir una falta greument perjudicial per a la convivència i comportar expedient disciplinari.": "Використання, що порушує основні права, може бути серйозним порушенням співіснування і призвести до дисциплінарного провадження.",
    "Si un alumne/a es nega a lliurar el telèfon quan se li demana, es considera falta molt greu.": "Якщо учень/учениця відмовляється передати телефон на вимогу, це вважається дуже серйозним порушенням.",
    "L'institut no es fa responsable de desperfectes o robatoris. Les famílies i l'alumnat han de conèixer aquesta normativa, i qualsevol professor/a pot comprovar que el telèfon està completament apagat.": "Заклад не несе відповідальності за пошкодження або крадіжки. Сім’ї та учні мають знати ці правила, і будь-який викладач може перевірити, що телефон повністю вимкнений.",
    "Només es considera realment apagat si l'accés a qualsevol aplicació necessita que el dispositiu iniciï el sistema operatiu. No ho són el bloqueig de pantalla, el mode avió, el mode rellotge o estats equivalents.": "Телефон вважається справді вимкненим лише тоді, коли для доступу до будь-якої програми пристрій має запустити операційну систему. Блокування екрана, режим польоту, режим годинника або подібні стани не вважаються вимкненням.",
    "En cas d'ús de telèfon mòbil sense consentiment familiar o sense complir la normativa, s'aplicaran les mesures disciplinàries corresponents.": "У разі використання мобільного телефону без згоди сім’ї або без дотримання правил застосовуватимуться відповідні дисциплінарні заходи.",
    "Consentiment sobre la tinència de telèfon mòbil al centre": "Згода щодо наявності мобільного телефону в закладі",
    "NO DONO EL MEU CONSENTIMENT a què el meu fill/a porti telèfon mòbil, atenent-me a la normativa aquí descrita.": "Я НЕ ДАЮ ЗГОДИ, щоб моя дитина приносила мобільний телефон, відповідно до описаних тут правил.",
    "DONO EL MEU CONSENTIMENT PARTICULAR a què el meu fill/a porti telèfon mòbil al centre, atenent-me a la normativa aquí descrita.": "Я ДАЮ ОКРЕМУ ЗГОДУ, щоб моя дитина приносила мобільний телефон до закладу, відповідно до описаних тут правил.",
    "8. Lloc, data i signatures": "8. Місце, дата і підписи",
  }
