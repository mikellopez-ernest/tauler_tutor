    "La Llei d'Educació de Catalunya (12/2009), a l'article 20, estableix que els centres, d'acord amb els seus projectes educatius, han de formular una carta de compromís educatiu per assolir un entorn de convivència i respecte.": "Catalonia Education Act (12/2009), article 20, establishes that schools, in accordance with their educational projects, must draw up an educational commitment letter to achieve an environment of coexistence and respect.",
