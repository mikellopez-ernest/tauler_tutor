    "Instar l'alumne/a a respectar les normes de funcionament del centre, el deure d'estudi, el respecte als altres i les normes de convivència.": "Побуждать учащегося соблюдать правила школы, обязанность учиться, уважение к другим и нормы сосуществования.",
    "Facilitar a l'institut informacions rellevants per al procés d'aprenentatge i la salut de l'alumne/a.": "Предоставлять школе информацию, важную для процесса обучения и здоровья учащегося.",
    "Aportar documents de justificació oficial en cas d'absència.": "Предоставлять официальные подтверждающие документы в случае отсутствия.",
    "No enviar l'alumne/a a l'institut quan tingui febre, malalties contagioses, infeccions per polls o causes equivalents, i recollir-lo personalment o mitjançant una persona major d'edat autoritzada quan calgui.": "Не отправлять учащегося в школу при температуре, заразных заболеваниях, педикулезе или аналогичных причинах, а при необходимости забирать его лично или через уполномоченного совершеннолетнего.",
    "Atendre en un període raonable les peticions d'entrevista o comunicació del centre i assistir puntualment a les reunions.": "В разумный срок отвечать на запросы школы о встрече или общении и приходить на собрания пунктуально.",
    "Respectar les NOFC i la regulació dels telèfons mòbils.": "Соблюдать NOFC и правила использования мобильных телефонов.",
    "Informar l'alumne/a menor d'edat de la signatura d'aquesta Carta de compromís educatiu i del que implica.": "Информировать несовершеннолетнего учащегося о подписании этого образовательного соглашения и его значении.",
    "I perquè així consti, ho signem a tots els efectes, a partir de la data d'avui.": "В подтверждение этого мы подписываем документ для всех целей, начиная с сегодняшней даты.",
    "He llegit i accepto la Carta de compromís educatiu.": "Я прочитал(а) и принимаю образовательное соглашение.",
    "7. Normativa d'ús de telèfons mòbils": "7. Правила использования мобильных телефонов",
    "Normativa d'ús de telèfons mòbils": "Правила использования мобильных телефонов",
    "Arran de l'aprovació de l'actualització de les NOFC, us informem de la normativa que regularà l'ús dels telèfons mòbils a l'institut Ernest Lluch i Martín.": "После утверждения обновления NOFC мы информируем вас о правилах, регулирующих использование мобильных телефонов в Institut Ernest Lluch i Martín.",
    "El centre entén que no hi ha cap urgència que justifiqui la utilització del telèfon mòbil. L'institut disposa de telèfon i personal de consergeria per agilitzar qualsevol informació que hagi d'arribar de les famílies a l'alumnat i viceversa.": "Школа считает, что нет срочной необходимости, оправдывающей использование мобильного телефона. В школе есть телефон и сотрудники приемной, чтобы оперативно передавать любую информацию между семьями и учащимися.",
    "L'ús de telèfons mòbils està prohibit per a l'alumnat en tots els espais del centre educatiu i en totes les activitats educatives que puguin tenir lloc fora del centre. La tinència del dispositiu només és possible si està completament apagat en entrar al centre i si l'institut té constància escrita del consentiment familiar.": "Использование мобильных телефонов учащимися запрещено во всех помещениях школы и во всех образовательных мероприятиях вне школы. Наличие устройства возможно только если оно полностью выключено при входе в школу и если у школы есть письменное согласие семьи.",
    "Aquestes indicacions també s'han de complir en activitats fora del centre: sortides, colònies, viatges, projectes compartits, activitats amb famílies o comunitat educativa, extraescolars i activitats amb entitats de l'entorn.": "Эти указания также должны соблюдаться на мероприятиях вне школы: экскурсиях, лагерях, поездках, совместных проектах, мероприятиях с семьями или образовательным сообществом, внеклассных мероприятиях и мероприятиях с местными организациями.",
    "Estudis postobligatoris": "Постобязательное образование",
    "L'alumnat d'estudis postobligatoris ha de fer un ús responsable dels dispositius mòbils i vincular-los a les activitats d'aprenentatge quan el professorat ho indiqui.": "Учащиеся постобязательных программ должны ответственно использовать мобильные устройства и связывать их с учебной деятельностью, когда это указывает преподаватель.",
    "Excepcionalitats": "Исключения",
    "Salut: es permet utilitzar un dispositiu quan l'alumnat tingui una necessitat específica per motius de salut.": "Здоровье: устройство можно использовать, когда у учащегося есть особая потребность по состоянию здоровья.",
    "NESE: es permet utilitzar un dispositiu quan sigui necessari per facilitar l'accés a l'aprenentatge, la participació o la comunicació.": "NESE: устройство можно использовать, когда оно необходимо для доступа к обучению, участия или коммуникации.",
    "Emergències: en una situació d'emergència, l'alumnat pot utilitzar el telèfon mòbil per comunicar-se amb la família.": "Чрезвычайные ситуации: в чрезвычайной ситуации учащийся может использовать мобильный телефон для связи с семьей.",
    "Mesures correctores i sancions": "Корректирующие меры и санкции",
    "L'ús del telèfon mòbil sense consentiment previ d'un docent pot constituir una falta lleu si no afecta drets fonamentals o protecció de dades.": "Использование мобильного телефона без предварительного разрешения преподавателя может считаться легким нарушением, если не затрагивает основные права или защиту данных.",
    "L'ús que vulneri drets fonamentals pot constituir una falta greument perjudicial per a la convivència i comportar expedient disciplinari.": "Использование, нарушающее основные права, может считаться серьезным нарушением сосуществования и повлечь дисциплинарное производство.",
    "Si un alumne/a es nega a lliurar el telèfon quan se li demana, es considera falta molt greu.": "Если учащийся отказывается передать телефон по требованию, это считается очень серьезным нарушением.",
    "L'institut no es fa responsable de desperfectes o robatoris. Les famílies i l'alumnat han de conèixer aquesta normativa, i qualsevol professor/a pot comprovar que el telèfon està completament apagat.": "Школа не несет ответственности за повреждения или кражи. Семьи и учащиеся должны знать эти правила, и любой преподаватель может проверить, что телефон полностью выключен.",
    "Només es considera realment apagat si l'accés a qualsevol aplicació necessita que el dispositiu iniciï el sistema operatiu. No ho són el bloqueig de pantalla, el mode avió, el mode rellotge o estats equivalents.": "Телефон считается действительно выключенным только если для доступа к любому приложению устройство должно загрузить операционную систему. Блокировка экрана, режим полета, режим часов или аналогичные состояния не считаются выключением.",
    "En cas d'ús de telèfon mòbil sense consentiment familiar o sense complir la normativa, s'aplicaran les mesures disciplinàries corresponents.": "В случае использования мобильного телефона без согласия семьи или без соблюдения правил будут применяться соответствующие дисциплинарные меры.",
