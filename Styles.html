<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --surface-muted: #edf1f5;
    --line: #d9e0e8;
    --text: #17202a;
    --muted: #617080;
    --accent: #0f766e;
    --accent-dark: #115e59;
    --danger: #b42318;
    --shadow: 0 16px 40px rgba(21, 34, 50, 0.10);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, Roboto, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }

  .app-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
  }

  .sidebar {
    background: #15202b;
    color: #fff;
    padding: 24px 18px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    display: inline-grid;
    place-items: center;
    background: var(--accent);
    font-weight: 800;
  }

  .brand-text {
    font-weight: 700;
  }

  .nav {
    display: grid;
    gap: 6px;
  }

  .nav-link {
    color: #dce5ec;
    text-decoration: none;
    border-radius: 6px;
    padding: 10px 12px;
    font-weight: 600;
  }

  .nav-link:hover,
  .nav-link.active {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
  }

  .main {
    padding: 32px;
    min-width: 0;
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .page-header {
    margin-bottom: 26px;
  }

  .eyebrow {
    margin: 0 0 6px;
    color: var(--accent-dark);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 8px;
    font-size: 32px;
    line-height: 1.15;
  }

  h2 {
    margin-bottom: 0;
    font-size: 20px;
  }

  .subtle,
  .empty {
    color: var(--muted);
  }

  .table-section {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }

  .count {
    color: var(--muted);
    font-weight: 700;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    white-space: nowrap;
  }

  th {
    background: var(--surface-muted);
    color: #344354;
    font-size: 13px;
  }

  tr:last-child td {
    border-bottom: 0;
  }

  .empty {
    padding: 20px;
    margin: 0;
  }

  .error-page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .error-box {
    width: min(680px, 100%);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 28px;
  }

  .error-box h1 {
    color: var(--danger);
  }

  pre {
    margin: 18px 0 0;
    max-height: 220px;
    overflow: auto;
    border-radius: 6px;
    background: #f8fafc;
    color: #3d4a5c;
    padding: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  @media (max-width: 760px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      padding: 16px;
    }

    .nav {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .nav-link {
      text-align: center;
      padding: 9px 6px;
      font-size: 13px;
    }

    .main {
      padding: 22px 16px;
    }

    h1 {
      font-size: 27px;
    }

    th,
    td {
      padding: 11px 14px;
    }
  }
</style>
